<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gold: { 400: '#FACC15', 500: '#EAB308', 600: '#CA8A04' } } } } }
    </script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; background: radial-gradient(circle at top, #1a1400 0%, #0a0a0a 100%); color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .chat-header { flex-shrink: 0; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(234,179,8,0.2); padding: 16px; display: flex; align-items: center; gap: 12px; z-index: 40; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 20px; -ms-overflow-style: none; scrollbar-width: none; }
        .chat-area::-webkit-scrollbar { display: none; }

        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-weight: 600; font-size: 14px; position: relative; word-wrap: break-word; line-height: 1.5; }
        .bubble-me { background: linear-gradient(135deg, #333, #111); color: white; align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid #333; }
        .bubble-ai { background: rgba(20,15,0,0.8); color: #FDE047; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(234,179,8,0.4); box-shadow: 0 4px 15px rgba(234,179,8,0.1); }

        .ai-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #FDE047, #CA8A04); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(234,179,8,0.5); margin-right: 8px; flex-shrink: 0; }

        .input-area { flex-shrink: 0; background: rgba(10,10,10,0.9); border-top: 1px solid rgba(234,179,8,0.2); padding: 12px 16px; display: flex; gap: 10px; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 40; }
        .chat-input { flex: 1; background: #171717; border-radius: 24px; padding: 14px 20px; outline: none; border: 1px solid rgba(234,179,8,0.3); font-size: 14px; color: #fef08a; transition: border 0.3s; }
        .chat-input:focus { border-color: #FDE047; box-shadow: 0 0 15px rgba(234,179,8,0.2); }

        .send-btn { background: linear-gradient(135deg, #FDE047, #CA8A04); color: black; width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(234,179,8,0.4); flex-shrink: 0;}
        .send-btn:active { transform: scale(0.9); }
        
        .typing-indicator { display: flex; gap: 4px; padding: 10px 14px; align-items: center; }
        .typing-dot { width: 6px; height: 6px; background: #FDE047; border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="chat-header">
        <button onclick="window.parent.loadModule('network.html', null)" class="text-gold-500 hover:text-gold-400 p-2 bg-black/50 rounded-full border border-gold-500/30"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-gold-400 to-gold-600 p-[2px] shadow-[0_0_15px_rgba(234,179,8,0.4)]">
            <div class="w-full h-full bg-black rounded-full flex items-center justify-center">
                <i data-lucide="bot" class="w-6 h-6 text-gold-500"></i>
            </div>
        </div>
        <div class="flex-1">
            <h2 class="text-base font-extrabold text-gold-400 leading-tight">Golden's Premium AI</h2>
            <p class="text-[10px] font-bold text-green-500 flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online & Ready</p>
        </div>
    </div>

    <div id="chatArea" class="chat-area">
        <div class="flex items-end mt-4">
            <div class="ai-avatar"><i data-lucide="sparkles" class="w-4 h-4 text-black"></i></div>
            <div class="bubble bubble-ai">
                Greetings, CEO. I am Golden AI, your enterprise strategist. How can I assist you with market analysis, inventory optimization, or B2B outreach today?
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Ask Golden AI..." class="chat-input" onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()" class="send-btn"><i data-lucide="arrow-up" class="w-6 h-6 stroke-[3]"></i></button>
    </div>

    <script>
        lucide.createIcons();

        function renderAiMessage(text) {
            const area = document.getElementById('chatArea');
            area.innerHTML += `
                <div class="flex items-end mt-2">
                    <div class="ai-avatar"><i data-lucide="bot" class="w-4 h-4 text-black"></i></div>
                    <div class="bubble bubble-ai">${text}</div>
                </div>
            `;
            lucide.createIcons();
            area.scrollTop = area.scrollHeight;
        }

        function showTyping() {
            const area = document.getElementById('chatArea');
            area.innerHTML += `
                <div class="flex items-end mt-2" id="typingIndicator">
                    <div class="ai-avatar"><i data-lucide="bot" class="w-4 h-4 text-black"></i></div>
                    <div class="bubble bubble-ai typing-indicator">
                        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            area.scrollTop = area.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if(el) el.remove();
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;
            input.value = '';

            const area = document.getElementById('chatArea');
            area.innerHTML += `<div class="bubble bubble-me mt-2">${text}</div>`;
            area.scrollTop = area.scrollHeight;

            showTyping();

            // Simulate AI Response (You can connect this to Gemini API later!)
            setTimeout(() => {
                removeTyping();
                const responses = [
                    "Based on current market trends, your pricing is highly competitive. I recommend pushing this via Reels.",
                    "I have analyzed your inventory. You are running low on 'Grade A+' items. Consider updating your MOQ.",
                    "Connecting with global suppliers? I suggest standardizing your payment terms to 'Online & Cash' for maximum conversion."
                ];
                const res = responses[Math.floor(Math.random() * responses.length)];
                renderAiMessage(res);
            }, 1500);
        }
    </script>
</body>
</html>

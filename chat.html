<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - Golden's</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gold: { 400: '#FACC15', 500: '#EAB308', 600: '#CA8A04' }, premium: { 900: '#0a0a0a', 800: '#171717' } } } } }
    </script>
    <style>
        /* THE ULTIMATE LAYOUT FIX: Forces exact fit inside the iframe */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; position: fixed; inset: 0; overflow: hidden; display: flex; flex-direction: column; background: #f8fafc; }
        .dark body { background: #0f172a; }
        .theme-golden body { background: radial-gradient(circle at top left, #1a1400 0%, #0a0a0a 100%); color: #fef08a; }
        
        .chat-header { flex-shrink: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 12px 16px; display: flex; align-items: center; gap: 12px; z-index: 40; }
        .dark .chat-header { background: rgba(15,23,42,0.9); border-color: rgba(255,255,255,0.05); }
        .theme-golden .chat-header { background: rgba(10,10,10,0.9); border-color: rgba(234,179,8,0.2); }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; -ms-overflow-style: none; scrollbar-width: none; }
        .chat-area::-webkit-scrollbar { display: none; }

        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-weight: 600; font-size: 14px; position: relative; word-wrap: break-word; }
        .bubble-me { background: #EAB308; color: black; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(234,179,8,0.3); }
        .bubble-them { background: white; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .dark .bubble-them { background: #1e293b; color: white; border-color: #334155; }
        .theme-golden .bubble-them { background: #171717; color: #FDE047; border-color: rgba(234,179,8,0.3); }

        .msg-time { font-size: 9px; opacity: 0.7; margin-top: 4px; text-align: right; }

        /* INPUT AREA STRICTLY ANCHORED */
        .input-area { flex-shrink: 0; background: white; border-top: 1px solid rgba(0,0,0,0.05); padding: 12px 16px;  margin-top: 20px; display: flex; gap: 8px; align-items: center; z-index: 40; }
        .dark .input-area { background: #0f172a; border-color: rgba(255,255,255,0.05); }
        .theme-golden .input-area { background: #0a0a0a; border-color: rgba(234,179,8,0.2); }

        .chat-input { flex: 1; background: #f1f5f9; border-radius: 24px; padding: 12px 20px; outline: none; border: 1px solid transparent; font-size: 14px; }
        .dark .chat-input { background: #1e293b; color: white; }
        .theme-golden .chat-input { background: #171717; color: #fef08a; border-color: rgba(234,179,8,0.3); }
        .theme-golden .chat-input:focus { border-color: #FDE047; }

        .send-btn { background: #EAB308; color: black; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(234,179,8,0.4); flex-shrink: 0;}
    </style>
</head>
<body class="transition-colors duration-300">

    <div class="chat-header">
        <button onclick="window.parent.loadModule('network.html', null)" class="text-slate-400 hover:text-gold-500"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
        <img id="headDp" src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full object-cover border border-slate-200 dark:border-slate-700 theme-golden:border-gold-500">
        <div class="flex-1 overflow-hidden">
            <h2 id="headName" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-300 truncate">Connecting...</h2>
            <p id="headActive" class="text-[10px] font-bold text-slate-500">...</p>
        </div>
    </div>

    <div id="chatArea" class="chat-area">
        <p class="text-center text-xs text-slate-400 font-bold my-4 bg-slate-100 dark:bg-slate-800 theme-golden:bg-premium-800 p-2 rounded-xl mx-auto w-fit">Golden techS Encrypted Chat</p>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Secure message..." class="chat-input" onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()" class="send-btn"><i data-lucide="send" class="w-5 h-5 ml-1"></i></button>
    </div>

    <script>
        lucide.createIcons();
        const SUPABASE_URL = 'https://puvdfqnjzliiuupchppj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null; let supplierId = null; let chatId = null; let presenceInterval = null;

        function applySettings() {
            const theme = localStorage.getItem('golden_theme') || 'system';
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else if (theme === 'golden') document.documentElement.classList.add('dark', 'theme-golden');
        }

        async function init() {
            applySettings();
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) return; currentUser = user;
            
            supplierId = localStorage.getItem('chat_supplier_id');
            if(!supplierId) return window.parent.loadModule('network.html', null);

            await loadSupplierHeader();
            await setupChatEngine();
            
            presenceInterval = setInterval(updatePresenceAndCheck, 10000);
            updatePresenceAndCheck();
        }

        async function updatePresenceAndCheck() {
            _supabase.from('profiles').update({ last_active: new Date().toISOString() }).eq('id', currentUser.id).then();
            
            // Respect Privacy Settings!
            const { data } = await _supabase.from('profiles').select('last_active, app_settings').eq('id', supplierId).single();
            const actBox = document.getElementById('headActive');

            if(data) {
                // Check if they turned OFF 'Show Online Status'
                if(data.app_settings && data.app_settings.privacy_online_status === false) {
                    actBox.innerText = 'Status Hidden';
                    actBox.className = 'text-[10px] font-bold text-slate-400';
                    return;
                }

                if(data.last_active) {
                    const diff = Math.floor((new Date() - new Date(data.last_active)) / 60000);
                    if(diff < 2) { actBox.innerText = '🟢 Online'; actBox.className = 'text-[10px] font-bold text-green-500'; } 
                    else if(diff < 60) { actBox.innerText = `Last seen ${diff}m ago`; actBox.className = 'text-[10px] font-bold text-slate-500'; } 
                    else { actBox.innerText = 'Offline'; actBox.className = 'text-[10px] font-bold text-slate-400'; }
                }
            }
        }

        async function loadSupplierHeader() {
            const { data } = await _supabase.from('profiles').select('company_name, dp_url').eq('id', supplierId).single();
            if(data) {
                document.getElementById('headName').innerText = data.company_name || 'Business User';
                if(data.dp_url) document.getElementById('headDp').src = _supabase.storage.from('profile_pictures').getPublicUrl(data.dp_url).data.publicUrl;
            }
        }

        async function setupChatEngine() {
            const [{ data: c1 }, { data: c2 }] = await Promise.all([
                _supabase.from('chats').select('id').eq('buyer_id', currentUser.id).eq('supplier_id', supplierId),
                _supabase.from('chats').select('id').eq('buyer_id', supplierId).eq('supplier_id', currentUser.id)
            ]);
            
            if(c1 && c1.length > 0) chatId = c1[0].id;
            else if (c2 && c2.length > 0) chatId = c2[0].id;
            else {
                const { data: newChat } = await _supabase.from('chats').insert([{ buyer_id: currentUser.id, supplier_id: supplierId }]).select('id');
                if(newChat) chatId = newChat[0].id;
            }

            if(chatId) {
                const { data: history } = await _supabase.from('messages').select('*').eq('chat_id', chatId).order('created_at', { ascending: true });
                if(history) history.forEach(msg => renderMessage(msg));

                _supabase.channel(`chat_${chatId}`)
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${chatId}` }, payload => {
                        if(payload.new.sender_id !== currentUser.id) {
                            renderMessage(payload.new); 
                            // Check sound setting to play ping
                            const mySettings = JSON.parse(localStorage.getItem('golden_user_settings') || '{}');
                            if(mySettings.notif_sound !== false) playSound();
                        }
                    }).subscribe();
            }
        }

        function playSound() {
            // Short subtle pop sound
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1);
        }

        function renderMessage(msg) {
            const isMe = msg.sender_id === currentUser.id;
            const d = new Date(msg.created_at);
            const timeStr = `${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
            
            const area = document.getElementById('chatArea');
            area.innerHTML += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'}">${msg.content}<div class="msg-time">${timeStr}</div></div>`;
            setTimeout(() => area.scrollTop = area.scrollHeight, 100); 
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput'); const text = input.value.trim();
            if(!text || !chatId) return;
            input.value = '';

            renderMessage({ sender_id: currentUser.id, content: text, created_at: new Date().toISOString() });
            await _supabase.from('messages').insert([{ chat_id: chatId, sender_id: currentUser.id, content: text }]);
            await _supabase.from('profiles').update({ last_active: new Date().toISOString() }).eq('id', currentUser.id);
        }

        window.onunload = () => clearInterval(presenceInterval);
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

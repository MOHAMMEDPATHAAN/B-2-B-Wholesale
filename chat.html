<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat - Golden's</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gold: { 400: '#FACC15', 500: '#EAB308', 600: '#CA8A04' }, premium: { 900: '#0a0a0a', 800: '#171717' } } } } }
    </script>
    <style>
        /* DVH ensures exact fit on mobile browsers, preventing keyboard overlap */
        html, body { margin: 0; padding: 0; height: 100dvh; width: 100%; overflow: hidden; background: #f8fafc; }
        .dark body { background: #0f172a; }
        .theme-golden body { background: #000; color: #fef08a; }
        
        .hidden-view { display: none !important; }

        /* Main Wrapper - Flex Column forces input to bottom */
        #mainContainer { display: flex; flex-direction: column; height: 100%; width: 100%; max-width: 1024px; margin: 0 auto; position: relative; background-size: cover; background-position: center; border-left: 1px solid rgba(0,0,0,0.05); border-right: 1px solid rgba(0,0,0,0.05); }
        .dark #mainContainer { border-color: rgba(255,255,255,0.05); }
        .theme-golden #mainContainer { border-color: rgba(234,179,8,0.2); }
        
        /* Header */
        .chat-header { flex-shrink: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 12px 16px; display: flex; align-items: center; gap: 12px; z-index: 40; }
        .dark .chat-header { background: rgba(15,23,42,0.95); border-color: rgba(255,255,255,0.05); }
        .theme-golden .chat-header { background: rgba(10,10,10,0.95); border-color: rgba(234,179,8,0.2); }

        /* Scrolling Message Area */
        .chat-area { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; background: rgba(255,255,255,0.6); backdrop-filter: blur(5px); }
        .dark .chat-area { background: rgba(15,23,42,0.6); }
        .theme-golden .chat-area { background: rgba(10,10,10,0.8); }
        .chat-area::-webkit-scrollbar { display: none; }

        /* Chat Bubbles */
        .bubble-wrapper { display: flex; flex-direction: column; max-width: 85%; cursor: pointer; transition: opacity 0.2s; }
        .bubble-wrapper:active { opacity: 0.8; }
        .bubble-me-wrapper { align-self: flex-end; align-items: flex-end; }
        .bubble-them-wrapper { align-self: flex-start; align-items: flex-start; }

        .bubble { padding: 10px 16px; border-radius: 20px; font-weight: 600; font-size: 14px; position: relative; word-wrap: break-word; line-height: 1.5; }
        .bubble-me { background: #EAB308; color: black; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(234,179,8,0.3); }
        .bubble-them { background: white; color: #1e293b; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .dark .bubble-them { background: #1e293b; color: white; border-color: #334155; }
        .theme-golden .bubble-them { background: #171717; color: #FDE047; border-color: rgba(234,179,8,0.3); }

        .msg-meta { font-size: 10px; opacity: 0.7; margin-top: 4px; display: flex; gap: 4px; align-items: center; }
        .ticks { width: 14px; height: 14px; }
        .ticks-read { color: #3b82f6; stroke: #3b82f6; }
        
        .translate-badge { font-size: 9px; font-weight: 800; background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 4px; display: flex; align-items: center; gap: 2px; margin-bottom: 4px; width: fit-content; }
        .dark .translate-badge, .theme-golden .translate-badge { background: rgba(255,255,255,0.1); }

        .chat-product-card { background: rgba(255,255,255,0.9); border-radius: 12px; padding: 8px; margin-bottom: 8px; display: flex; gap: 10px; align-items: center; border: 1px solid rgba(0,0,0,0.1); }
        .dark .chat-product-card { background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.1); }
        .theme-golden .chat-product-card { background: rgba(0,0,0,0.6); border-color: rgba(234,179,8,0.3); color: white; }

        /* Input Area */
        .input-area { flex-shrink: 0; background: white; border-top: 1px solid rgba(0,0,0,0.05); padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); display: flex; gap: 8px; align-items: center; z-index: 40; width: 100%; }
        .dark .input-area { background: #0f172a; border-color: rgba(255,255,255,0.05); }
        .theme-golden .input-area { background: #0a0a0a; border-color: rgba(234,179,8,0.2); }

        .chat-input { flex: 1; background: #f1f5f9; border-radius: 24px; padding: 12px 20px; outline: none; border: 1px solid transparent; font-size: 14px; min-width: 0; transition: border 0.3s; }
        .dark .chat-input { background: #1e293b; color: white; }
        .theme-golden .chat-input { background: #171717; color: #fef08a; border-color: rgba(234,179,8,0.3); }
        .theme-golden .chat-input:focus { border-color: #FDE047; }

        .recording-ui { flex: 1; display: flex; justify-content: space-between; align-items: center; background: #fee2e2; padding: 12px 20px; border-radius: 24px; color: #ef4444; font-weight: 700; font-size: 14px; }
        .dark .recording-ui, .theme-golden .recording-ui { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); }

        .icon-action-btn { color: #64748b; padding: 8px; border-radius: 50%; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
        .dark .icon-action-btn { color: #94a3b8; }
        .theme-golden .icon-action-btn { color: #CA8A04; }

        .send-btn { background: #EAB308; color: black; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(234,179,8,0.4); flex-shrink: 0;}
        .send-btn:active { transform: scale(0.9); }
        
        .mic-active { animation: pulseRecord 1s infinite; background: #ef4444 !important; color: white !important; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5); }
        @keyframes pulseRecord { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .attach-img { max-width: 220px; border-radius: 12px; margin-bottom: 6px; }

        /* Bottom Sheet Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: flex-end; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease-out; }
        .bottom-sheet { background: white; width: 100%; max-width: 1024px; margin: 0 auto; border-radius: 24px 24px 0 0; padding: 24px; padding-bottom: max(24px, env(safe-area-inset-bottom)); animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .dark .bottom-sheet { background: #1e293b; border-top: 1px solid #334155; }
        .theme-golden .bottom-sheet { background: #0a0a0a; border-top: 1px solid rgba(234,179,8,0.3); }

        .sheet-btn { width: 100%; display: flex; align-items: center; gap: 16px; padding: 16px; border-radius: 16px; font-weight: 700; color: #1e293b; transition: background 0.2s; cursor: pointer;}
        .dark .sheet-btn { color: white; }
        .theme-golden .sheet-btn { color: #FDE047; }
        .sheet-btn:active { background: #f1f5f9; }
        .dark .sheet-btn:active { background: #0f172a; }
        .theme-golden .sheet-btn:active { background: #171717; }
        .sheet-btn-danger { color: #ef4444 !important; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Block Overlay */
        #blockOverlay { position: absolute; inset: 0; z-index: 50; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dark #blockOverlay { background: rgba(15,23,42,0.9); }
        .theme-golden #blockOverlay { background: rgba(0,0,0,0.9); }
    </style>
</head>
<body class="transition-colors duration-300">

<div id="mainContainer">
    
    <!-- BLOCK OVERLAY (Hidden by default) -->
    <div id="blockOverlay" class="hidden-view">
        <i data-lucide="shield-alert" class="w-16 h-16 text-red-500 mb-4"></i>
        <h2 class="text-xl font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-400">Communication Blocked</h2>
        <p class="text-sm text-slate-500 mt-2 text-center px-6">You cannot send messages to this business at this time.</p>
        <button onclick="window.parent.loadModule('network.html', null)" class="mt-6 px-6 py-3 bg-slate-200 dark:bg-slate-700 theme-golden:bg-premium-800 rounded-full font-bold text-sm">Return to Network</button>
    </div>

    <!-- HEADER -->
    <div class="chat-header">
        <button onclick="window.parent.loadModule('network.html', null)" class="text-slate-400 hover:text-gold-500"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
        <img id="headDp" src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full object-cover border border-slate-200 dark:border-slate-700 theme-golden:border-gold-500 cursor-pointer" onclick="routeToProfile()">
        <div class="flex-1 overflow-hidden cursor-pointer" onclick="routeToProfile()">
            <h2 id="headName" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-300 truncate">Connecting...</h2>
            <p id="headActive" class="text-[10px] font-bold text-slate-500">...</p>
        </div>
        <!-- App Popups & Calls Link -->
        <button onclick="startCall('video')" class="text-slate-400 hover:text-gold-500"><i data-lucide="video" class="w-5 h-5"></i></button>
        <button onclick="startCall('audio')" class="text-slate-400 hover:text-gold-500"><i data-lucide="phone" class="w-5 h-5"></i></button>
    </div>

    <!-- CHAT AREA -->
    <div id="chatArea" class="chat-area">
        <p class="text-center text-[10px] text-slate-400 font-bold my-2 bg-white/80 dark:bg-slate-800/80 theme-golden:bg-premium-800/80 backdrop-blur p-2 rounded-xl mx-auto w-fit">Golden techS 256-bit Encrypted</p>
    </div>

    <!-- EDIT MODE INDICATOR -->
    <div id="editBar" class="hidden-view px-4 py-2 bg-slate-100 dark:bg-slate-800 theme-golden:bg-premium-800 flex justify-between items-center border-t border-slate-200 dark:border-slate-700 theme-golden:border-gold-500/20 text-xs">
        <div class="flex items-center gap-2 text-gold-600 font-bold"><i data-lucide="edit-2" class="w-4 h-4"></i> Editing Message (30m Limit)</div>
        <button onclick="cancelEdit()" class="text-slate-500 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>

    <input type="file" id="fileAttach" class="hidden" onchange="uploadAttachment(event)">

    <!-- INPUT AREA -->
    <div class="input-area" id="inputAreaBox">
        <button class="icon-action-btn" onclick="document.getElementById('fileAttach').click()"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
        <button class="icon-action-btn" onclick="openScheduleModal()"><i data-lucide="clock" class="w-5 h-5"></i></button>
        
        <input type="text" id="msgInput" placeholder="Message..." class="chat-input" onkeypress="if(event.key === 'Enter') handleSend()">
        
        <div id="recordUI" class="recording-ui hidden-view">
            <div class="flex items-center gap-2"><span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> <span id="recordTimer">00:00</span></div>
            <div class="text-[10px] flex items-center gap-1 opacity-70 animate-pulse"><i data-lucide="chevron-left" class="w-3 h-3"></i> Slide to cancel</div>
        </div>
        
        <div id="micTouchArea" style="touch-action: none;">
            <button id="micBtn" class="icon-action-btn bg-slate-100 dark:bg-slate-800 theme-golden:bg-premium-800 rounded-full p-2.5"><i data-lucide="mic" class="w-5 h-5"></i></button>
        </div>
        <button id="sendBtn" onclick="handleSend()" class="send-btn hidden-view"><i data-lucide="send" class="w-5 h-5 ml-1"></i></button>
    </div>
</div>

<!-- ========================================== -->
<!-- MODALS (Options, Delete, Schedule)         -->
<!-- ========================================== -->
<div id="msgOptionsModal" class="modal-overlay" onclick="closeModal('msgOptionsModal')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-700 theme-golden:bg-gold-500/50 rounded-full mx-auto mb-6"></div>
        <button onclick="forwardMessage()" class="sheet-btn"><div class="p-2 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-xl"><i data-lucide="forward" class="w-5 h-5"></i></div> Forward to Network</button>
        <button id="btnEditMsg" onclick="initiateEdit()" class="sheet-btn"><div class="p-2 bg-green-100 dark:bg-green-900/30 text-green-600 rounded-xl"><i data-lucide="edit-3" class="w-5 h-5"></i></div> Edit Message</button>
        <button onclick="openDeleteModal()" class="sheet-btn sheet-btn-danger"><div class="p-2 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-xl"><i data-lucide="trash-2" class="w-5 h-5"></i></div> Delete Message</button>
    </div>
</div>

<div id="deleteOptionsModal" class="modal-overlay" onclick="closeModal('deleteOptionsModal')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-700 theme-golden:bg-gold-500/50 rounded-full mx-auto mb-6"></div>
        <h3 class="text-center font-bold text-slate-500 mb-4">Delete Message</h3>
        <button id="btnDeleteEveryone" onclick="deleteForEveryone()" class="sheet-btn sheet-btn-danger"><div class="p-2 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-xl"><i data-lucide="trash-2" class="w-5 h-5"></i></div> Delete for everyone</button>
        <button onclick="deleteForMe()" class="sheet-btn"><div class="p-2 bg-slate-100 dark:bg-slate-800 text-slate-600 rounded-xl theme-golden:bg-premium-800 theme-golden:text-gold-500"><i data-lucide="user-x" class="w-5 h-5"></i></div> Delete for me</button>
        <button onclick="closeModal('deleteOptionsModal')" class="sheet-btn justify-center mt-2 border border-slate-200 dark:border-slate-700 theme-golden:border-gold-500/30">Cancel</button>
    </div>
</div>

<div id="scheduleModal" class="modal-overlay" onclick="closeModal('scheduleModal')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-400">Schedule Message</h2>
            <button onclick="closeModal('scheduleModal')" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <input type="datetime-local" id="scheduleDate" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 outline-none font-bold text-slate-800 dark:text-white theme-golden:bg-premium-800 theme-golden:border-gold-500/30 theme-golden:text-gold-100 mb-4">
        <button onclick="scheduleMessage()" class="w-full bg-gold-500 text-black font-extrabold py-4 rounded-xl shadow-lg shadow-gold-500/30 hover:scale-[1.02] transition-transform">Set Schedule</button>
    </div>
</div>

<script>
    lucide.createIcons();
    const SUPABASE_URL = 'https://puvdfqnjzliiuupchppj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null; let supplierId = null; let supplierProfile = null; let chatId = null; 
    let presenceInterval = null; let allMessages = []; 
    let activeMsg = null; let isEditing = false; let isSending = false;
    let userSettings = {};

    // Media Recorder Vars
    let mediaRecorder; let audioChunks = []; let recordInterval; let recordSeconds = 0;

    function applySettings() {
        const theme = localStorage.getItem('golden_theme') || 'system';
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else if (theme === 'golden') document.documentElement.classList.add('dark', 'theme-golden');
        
        const bg = localStorage.getItem('golden_chat_bg');
        if(bg) {
            document.getElementById('mainContainer').style.backgroundImage = `url('${bg}')`;
            document.getElementById('chatArea').style.background = 'rgba(0,0,0,0.4)';
        }
    }

    async function init() {
        applySettings();
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) return; currentUser = user;
        
        supplierId = localStorage.getItem('chat_supplier_id');
        if(!supplierId) return window.parent.loadModule('network.html', null);

        // Fetch local settings
        const { data: pData } = await _supabase.from('profiles').select('app_settings, blocked_users').eq('id', currentUser.id).single();
        userSettings = pData?.app_settings || {};

        // Input Toggle
        document.getElementById('msgInput').addEventListener('input', function() {
            if(this.value.trim().length > 0) {
                document.getElementById('micTouchArea').classList.add('hidden-view');
                document.getElementById('sendBtn').classList.remove('hidden-view');
            } else {
                document.getElementById('micTouchArea').classList.remove('hidden-view');
                document.getElementById('sendBtn').classList.add('hidden-view');
            }
        });

        await loadSupplierHeader();
        await setupChatEngine();
        
        presenceInterval = setInterval(updatePresenceAndCheck, 10000);
        updatePresenceAndCheck();
        setupAudioGestures();
    }

    // --- ROUTING & CALLS ---
    function routeToProfile() { localStorage.setItem('view_company_id', supplierId); window.parent.loadModule('seeprofile.html', null); }
    function routeToProduct(id) { localStorage.setItem('view_product_id', id); window.parent.loadModule('seeproduct.html', null); }
    async function startCall(type) { 
        // Trigger App Popup Notification for supplier
        await _supabase.from('popups').insert([{ target_user_id: supplierId, type: 'call', caller_id: currentUser.id }]);
        localStorage.setItem('call_supplier_id', supplierId); localStorage.setItem('call_type', type); 
        window.parent.loadModule('call.html', null); 
    }

    // --- PRESENCE & BLOCK CHECK ---
    async function loadSupplierHeader() {
        const { data } = await _supabase.from('profiles').select('*').eq('id', supplierId).single();
        if(data) {
            supplierProfile = data;
            document.getElementById('headName').innerText = data.company_name || 'Business';
            if(data.dp_url) document.getElementById('headDp').src = _supabase.storage.from('profile_pictures').getPublicUrl(data.dp_url).data.publicUrl;
            
            // Block Check
            const myBlocks = currentUser.blocked_users || [];
            const theirBlocks = data.blocked_users || [];
            if(myBlocks.includes(supplierId) || theirBlocks.includes(currentUser.id)) {
                document.getElementById('blockOverlay').classList.remove('hidden-view');
            }
        }
    }

    async function updatePresenceAndCheck() {
        _supabase.from('profiles').update({ last_active: new Date().toISOString() }).eq('id', currentUser.id).then();
        if(!supplierProfile) return;

        // Fetch fresh status
        const { data } = await _supabase.from('profiles').select('last_active, app_settings').eq('id', supplierId).single();
        const actBox = document.getElementById('headActive');
        if(data) {
            if(data.app_settings && data.app_settings.privacy_online_status === false) { actBox.innerText = 'Status Hidden'; return; }
            if(data.last_active) {
                const diff = Math.floor((new Date() - new Date(data.last_active)) / 60000);
                if(diff < 2) { actBox.innerText = '🟢 Online'; actBox.className = 'text-[10px] font-bold text-green-500'; } 
                else if(diff < 60) { actBox.innerText = `Last active ${diff}m ago`; actBox.className = 'text-[10px] font-bold text-slate-500'; } 
                else { actBox.innerText = 'Offline'; actBox.className = 'text-[10px] font-bold text-slate-400'; }
            }
        }
    }

    // --- CHAT ENGINE & READ RECEIPTS ---
    async function setupChatEngine() {
        const [{ data: c1 }, { data: c2 }] = await Promise.all([
            _supabase.from('chats').select('id').eq('buyer_id', currentUser.id).eq('supplier_id', supplierId),
            _supabase.from('chats').select('id').eq('buyer_id', supplierId).eq('supplier_id', currentUser.id)
        ]);
        
        if(c1 && c1.length > 0) chatId = c1[0].id;
        else if (c2 && c2.length > 0) chatId = c2[0].id;
        else {
            const { data: newChat } = await _supabase.from('chats').insert([{ buyer_id: currentUser.id, supplier_id: supplierId }]).select('id');
            if(newChat) chatId = newChat[0].id;
        }

        if(chatId) {
            // Mark incoming messages as read
            await _supabase.from('messages').update({ read_by_recipient: true }).eq('chat_id', chatId).eq('sender_id', supplierId).eq('read_by_recipient', false);

            const { data: history } = await _supabase.from('messages').select('*, products(title, price, media_urls)').eq('chat_id', chatId).order('created_at', { ascending: true });
            if(history) { allMessages = history; renderAllMessages(); }

            _supabase.channel(`chat_${chatId}`)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'messages', filter: `chat_id=eq.${chatId}` }, async payload => {
                    if (payload.eventType === 'INSERT') {
                        if(payload.new.shared_product_id) {
                            const { data: p } = await _supabase.from('products').select('title, price, media_urls').eq('id', payload.new.shared_product_id).single();
                            payload.new.products = p;
                        }
                        if(payload.new.sender_id !== currentUser.id) {
                            allMessages.push(payload.new);
                            renderAllMessages();
                            if(userSettings.notif_sound !== false) playSound();
                            // Mark as read instantly
                            _supabase.from('messages').update({ read_by_recipient: true }).eq('id', payload.new.id).then();
                        }
                    } else if (payload.eventType === 'UPDATE') {
                        const idx = allMessages.findIndex(m => m.id === payload.new.id);
                        if(idx > -1) { 
                            payload.new.products = allMessages[idx].products; 
                            allMessages[idx] = payload.new; 
                            renderAllMessages(); 
                        }
                    }
                }).subscribe();
        }
    }

    function playSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    // --- RENDER MESSAGES ---
    function renderAllMessages() {
        const area = document.getElementById('chatArea');
        Array.from(area.children).forEach(child => { if(!child.classList.contains('text-center')) child.remove(); });
        
        const now = new Date();

        allMessages.forEach(msg => {
            if (msg.deleted_for && msg.deleted_for.includes(currentUser.id)) return;
            if (msg.scheduled_for && new Date(msg.scheduled_for) > now) return;

            const isMe = msg.sender_id === currentUser.id;
            const d = new Date(msg.created_at);
            const timeStr = `${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
            
            let contentHtml = msg.content || '';

            if (msg.is_deleted_for_everyone) {
                contentHtml = `<i class="text-slate-400 dark:text-slate-500 flex items-center gap-1"><i data-lucide="ban" class="w-3 h-3"></i> This message was deleted</i>`;
            } else {
                // Auto Translate Integration
                if (!isMe && userSettings.language && userSettings.language !== 'en' && msg.content) {
                    contentHtml = `<div class="translate-badge"><i data-lucide="languages" class="w-3 h-3"></i> Auto-Translated (${userSettings.language})</div> ${msg.content}`;
                }
                
                if (msg.audio_url) {
                    const volLevel = (userSettings.chat_audio_vol || 100) / 100;
                    let audioUrl = msg.audio_url.startsWith('blob:') ? msg.audio_url : _supabase.storage.from('chat_audio').getPublicUrl(msg.audio_url).data.publicUrl;
                    contentHtml = `<div class="flex items-center gap-2"><i data-lucide="mic" class="w-4 h-4 text-slate-800 theme-golden:text-gold-800"></i> <audio src="${audioUrl}" controls class="h-8 w-48" onplay="this.volume=${volLevel}"></audio></div>`;
                }

                if (msg.attachment_url) {
                    const attachUrl = msg.attachment_url.startsWith('blob:') ? msg.attachment_url : _supabase.storage.from('chat_attachments').getPublicUrl(msg.attachment_url).data.publicUrl;
                    if(msg.attachment_type === 'image') contentHtml = `<img src="${attachUrl}" class="attach-img" onclick="window.open('${attachUrl}')"> ${contentHtml}`;
                    else contentHtml = `<a href="${attachUrl}" target="_blank" class="flex items-center gap-2 bg-black/10 p-2 rounded"><i data-lucide="file" class="w-4 h-4"></i> <span class="font-bold text-xs">File</span></a>`;
                }

                if (msg.shared_product_id && msg.products) {
                    const imgUrl = msg.products.media_urls && msg.products.media_urls.length > 0 ? _supabase.storage.from('product_media').getPublicUrl(msg.products.media_urls[0].path).data.publicUrl : 'https://via.placeholder.com/150';
                    contentHtml = `
                        <div class="chat-product-card" onclick="routeToProduct('${msg.shared_product_id}')">
                            <img src="${imgUrl}" class="w-12 h-12 rounded object-cover">
                            <div>
                                <p class="text-xs font-bold leading-tight line-clamp-1">${msg.products.title}</p>
                                <p class="text-[10px] font-extrabold text-green-600 theme-golden:text-gold-400">₹${msg.products.price}</p>
                            </div>
                        </div>
                        ${contentHtml}
                    `;
                }
            }

            const editedTag = msg.is_edited && !msg.is_deleted_for_everyone ? '<span class="italic"> (edited)</span>' : '';
            
            // Read Receipts Logic
            let ticks = '';
            if(isMe) {
                // If supplier turned off read receipts in their settings, don't show blue ticks
                const supplierReceipts = supplierProfile?.app_settings?.privacy_read_receipts !== false;
                if(msg.read_by_recipient && supplierReceipts) {
                    ticks = `<i data-lucide="check-check" class="ticks ticks-read"></i>`;
                } else {
                    ticks = `<i data-lucide="check-check" class="ticks text-slate-400"></i>`;
                }
            }

            area.innerHTML += `
                <div class="bubble-wrapper ${isMe ? 'bubble-me-wrapper' : 'bubble-them-wrapper'}" onclick='openMsgOptions(${JSON.stringify(msg).replace(/'/g, "\\'")})'>
                    <div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'}">${contentHtml}</div>
                    <div class="msg-meta ${isMe ? 'text-slate-500 theme-golden:text-gold-600' : 'text-slate-400 theme-golden:text-gold-600'}">
                        ${timeStr} ${editedTag} ${ticks}
                    </div>
                </div>
            `;
        });
        lucide.createIcons();
        area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
    }

    // --- SENDING & AUTO-REPLY ---
    async function handleSend() {
        if(isSending) return;
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text || !chatId) return;

        isSending = true; input.value = '';

        if(isEditing && activeMsg) {
            cancelEdit();
            await _supabase.from('messages').update({ content: text, is_edited: true }).eq('id', activeMsg.id);
        } else {
            // Optimistic rendering
            const fakeMsg = { id: 'temp_'+Date.now(), sender_id: currentUser.id, content: text, created_at: new Date().toISOString() };
            allMessages.push(fakeMsg); renderAllMessages();

            await _supabase.from('messages').insert([{ chat_id: chatId, sender_id: currentUser.id, content: text }]);
            await _supabase.from('profiles').update({ last_active: new Date().toISOString() }).eq('id', currentUser.id);

            // Popups App Notification trigger
            _supabase.from('popups').insert([{ target_user_id: supplierId, type: 'message', caller_id: currentUser.id, content: text }]).then();

            // --- AUTO REPLY ENGINE ---
            if(supplierProfile?.app_settings?.b2b_autoreply) {
                // Only send auto reply if this is the first message today or similar logic. Simulated instantly for B2B.
                setTimeout(async () => {
                    const replyText = supplierProfile.app_settings.b2b_autoreply_text || "Hello! We have received your message and will reply shortly.";
                    await _supabase.from('messages').insert([{ chat_id: chatId, sender_id: supplierId, content: replyText }]);
                }, 2000);
            }
        }
        
        isSending = false;
        document.getElementById('micTouchArea').classList.remove('hidden-view');
        document.getElementById('sendBtn').classList.add('hidden-view');
    }

    // --- MESSAGE OPTIONS & EDIT ---
    function openMsgOptions(msg) {
        activeMsg = msg;
        const diffMins = (new Date() - new Date(msg.created_at)) / 60000;
        
        // 30 Min Edit Lock
        if (diffMins > 30 || msg.sender_id !== currentUser.id || msg.is_deleted_for_everyone) {
            document.getElementById('btnEditMsg').classList.add('hidden-view');
        } else {
            document.getElementById('btnEditMsg').classList.remove('hidden-view');
        }

        // B2B Admin delete override (Users can delete their own, but can't delete everyone's unless they sent it)
        if (msg.sender_id !== currentUser.id) {
            document.getElementById('btnDeleteEveryone').classList.add('hidden-view');
        } else {
            document.getElementById('btnDeleteEveryone').classList.remove('hidden-view');
        }

        document.getElementById('msgOptionsModal').classList.add('active');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function initiateEdit() {
        closeModal('msgOptionsModal'); isEditing = true;
        document.getElementById('editBar').classList.remove('hidden-view');
        const input = document.getElementById('msgInput');
        input.value = activeMsg.content; input.focus();
        document.getElementById('micTouchArea').classList.add('hidden-view');
        document.getElementById('sendBtn').classList.remove('hidden-view');
    }
    function cancelEdit() {
        isEditing = false; activeMsg = null;
        document.getElementById('editBar').classList.add('hidden-view');
        document.getElementById('msgInput').value = '';
    }

    // --- DELETE LOGIC ---
    function openDeleteModal() {
        closeModal('msgOptionsModal'); document.getElementById('deleteOptionsModal').classList.add('active');
    }

    async function deleteForEveryone() {
        if(!activeMsg) return;
        closeModal('deleteOptionsModal');
        await _supabase.from('messages').update({ is_deleted_for_everyone: true, content: 'Deleted' }).eq('id', activeMsg.id);
    }

    async function deleteForMe() {
        if(!activeMsg) return;
        closeModal('deleteOptionsModal');
        let currentDeleted = activeMsg.deleted_for || [];
        if(!currentDeleted.includes(currentUser.id)) currentDeleted.push(currentUser.id);
        
        await _supabase.from('messages').update({ deleted_for: currentDeleted }).eq('id', activeMsg.id);
        const idx = allMessages.findIndex(m => m.id === activeMsg.id);
        if(idx > -1) { allMessages[idx].deleted_for = currentDeleted; renderAllMessages(); }
    }

    function forwardMessage() {
        closeModal('msgOptionsModal');
        if(!activeMsg || activeMsg.is_deleted_for_everyone) return alert("Cannot forward this message.");
        // Route to Share Sheet
        localStorage.setItem('share_item_type', 'message');
        localStorage.setItem('share_item_content', activeMsg.content);
        window.parent.loadModule('chatprofile.html', null);
    }

    // --- SCHEDULING ---
    function openScheduleModal() {
        const tzoffset = (new Date()).getTimezoneOffset() * 60000;
        const localISOTime = (new Date(Date.now() - tzoffset + 3600000)).toISOString().slice(0, 16);
        document.getElementById('scheduleDate').value = localISOTime;
        document.getElementById('scheduleModal').classList.add('active');
    }

    async function scheduleMessage() {
        const dateVal = document.getElementById('scheduleDate').value;
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text || !dateVal) return alert("Type a message and select time.");
        
        const scheduleDate = new Date(dateVal).toISOString();
        closeModal('scheduleModal'); input.value = '';

        await _supabase.from('messages').insert([{ chat_id: chatId, sender_id: currentUser.id, content: text, scheduled_for: scheduleDate }]);
        alert("Message Scheduled!");
    }

    // --- REAL AUDIO RECORDING (Slide to Cancel) ---
    async function uploadAttachment(event) {
        const file = event.target.files[0];
        if(!file || !chatId) return;
        event.target.value = '';
        const tempUrl = URL.createObjectURL(file);
        const isImage = file.type.startsWith('image/');
        
        allMessages.push({ id: 'temp_'+Date.now(), sender_id: currentUser.id, content: '', attachment_url: tempUrl, attachment_type: isImage ? 'image' : 'file', created_at: new Date().toISOString() });
        renderAllMessages();

        const path = `${currentUser.id}/attach_${Date.now()}.${file.name.split('.').pop()}`;
        const { error } = await _supabase.storage.from('chat_attachments').upload(path, file);
        if(!error) await _supabase.from('messages').insert([{ chat_id: chatId, sender_id: currentUser.id, content: '', attachment_url: path, attachment_type: isImage ? 'image' : 'file' }]);
    }

    function setupAudioGestures() {
        const micArea = document.getElementById('micTouchArea');
        const micBtn = document.getElementById('micBtn');
        let startX = 0; let isCancelled = false;

        micArea.addEventListener('touchstart', async (e) => {
            e.preventDefault(); startX = e.touches[0].clientX; isCancelled = false;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.addEventListener("dataavailable", ev => audioChunks.push(ev.data));
                mediaRecorder.start();

                document.getElementById('msgInput').classList.add('hidden-view');
                document.getElementById('recordUI').classList.remove('hidden-view');
                micBtn.classList.add('mic-active');
                
                recordSeconds = 0; document.getElementById('recordTimer').innerText = "00:00";
                recordInterval = setInterval(() => {
                    recordSeconds++;
                    const m = Math.floor(recordSeconds / 60).toString().padStart(2, '0');
                    const s = (recordSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('recordTimer').innerText = `${m}:${s}`;
                }, 1000);
            } catch(err) { alert("Microphone access denied."); }
        });

        micArea.addEventListener('touchmove', (e) => {
            if(!mediaRecorder) return;
            const currentX = e.touches[0].clientX;
            if(startX - currentX > 60) { // Slid left
                isCancelled = true; stopRecordingUI();
                mediaRecorder.stop(); mediaRecorder = null;
            }
        });

        micArea.addEventListener('touchend', (e) => {
            if(!mediaRecorder || isCancelled) return;
            stopRecordingUI();
            mediaRecorder.addEventListener("stop", async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const tempUrl = URL.createObjectURL(audioBlob);
                
                allMessages.push({ id: 'temp_'+Date.now(), sender_id: currentUser.id, content: '', audio_url: tempUrl, created_at: new Date().toISOString() });
                renderAllMessages();

                const path = `${currentUser.id}/voice_${Date.now()}.webm`;
                const { error } = await _supabase.storage.from('chat_audio').upload(path, audioBlob);
                if(!error) await _supabase.from('messages').insert([{ chat_id: chatId, sender_id: currentUser.id, content: '', audio_url: path }]);
            });
            mediaRecorder.stop(); mediaRecorder = null;
        });
    }

    function stopRecordingUI() {
        clearInterval(recordInterval);
        document.getElementById('recordUI').classList.add('hidden-view');
        document.getElementById('msgInput').classList.remove('hidden-view');
        document.getElementById('micBtn').classList.remove('mic-active');
    }

    window.addEventListener('DOMContentLoaded', init);
</script>

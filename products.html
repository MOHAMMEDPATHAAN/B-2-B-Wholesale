<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Products - Golden's</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gold: { 400: '#FACC15', 500: '#EAB308', 600: '#CA8A04' }, premium: { 900: '#0a0a0a', 800: '#171717' } } } } }
    </script>
    <style>
        body { background: #f8fafc; padding-bottom: 100px; }
        .dark body { background: #0f172a; }
        .theme-golden body { background: radial-gradient(circle at top left, #1a1400 0%, #0a0a0a 100%); color: #fef08a; }
        .hidden-view { display: none !important; }
        
        .header-glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 40;}
        .dark .header-glass { background: rgba(15,23,42,0.9); border-color: rgba(255,255,255,0.05); }
        .theme-golden .header-glass { background: rgba(10,10,10,0.9); border-color: rgba(234,179,8,0.2); }

        .btn-plus { background: #22c55e; color: white; box-shadow: 0 4px 15px rgba(34,197,94,0.3); }
        .theme-golden .btn-plus { background: linear-gradient(135deg, #FDE047, #EAB308); color: #000; box-shadow: 0 4px 15px rgba(234,179,8,0.3); }

        .form-input { width: 100%; padding: 12px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; outline: none; font-size: 14px; font-weight: 600; }
        .dark .form-input { background: #1e293b; border-color: #334155; color: white; }
        .theme-golden .form-input { background: rgba(20,15,0,0.5); border-color: rgba(234,179,8,0.3); color: #fef08a; }
        .theme-golden .form-input:focus { border-color: #FDE047; box-shadow: 0 0 10px rgba(234,179,8,0.2); }

        .product-card { background: white; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; position: relative; cursor: pointer; transition: transform 0.2s; }
        .product-card:active { transform: scale(0.98); }
        .dark .product-card { background: #1e293b; }
        .theme-golden .product-card { background: #171717; border: 1px solid rgba(234,179,8,0.2); box-shadow: 0 4px 15px rgba(234,179,8,0.05); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; overflow-y: auto; backdrop-filter: blur(5px); }
        .modal-content { background: white; min-height: 100vh; padding: 20px; padding-bottom: 100px; animation: slideUp 0.3s ease-out; }
        .dark .modal-content { background: #0f172a; }
        .theme-golden .modal-content { background: #0a0a0a; border-top: 1px solid rgba(234,179,8,0.3); }
        
        .instant-view-content { background: white; width: 90%; max-width: 400px; margin: auto; margin-top: 10vh; border-radius: 24px; padding: 24px; animation: scaleUp 0.3s ease-out; position: relative; }
        .dark .instant-view-content { background: #1e293b; }
        .theme-golden .instant-view-content { background: #171717; border: 1px solid rgba(234,179,8,0.4); box-shadow: 0 20px 50px rgba(234,179,8,0.15); }

        /* Delete Modal Specific */
        .delete-modal-content { background: white; width: 85%; max-width: 350px; margin: auto; margin-top: 30vh; border-radius: 24px; padding: 24px; text-align: center; animation: scaleUp 0.3s ease-out; border: 1px solid rgba(239, 68, 68, 0.3); box-shadow: 0 20px 50px rgba(239, 68, 68, 0.15); }
        .dark .delete-modal-content { background: #1e293b; }
        .theme-golden .delete-modal-content { background: #171717; border-color: rgba(239, 68, 68, 0.5); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="transition-colors duration-300">

    <!-- Header -->
    <div class="sticky top-0 z-40 header-glass px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold uppercase tracking-wide text-slate-800 dark:text-white theme-golden:text-gold-400" data-i18n="products">Products</h1>
            <p class="text-xs font-bold text-slate-500 theme-golden:text-gold-200/50"><span data-i18n="total">Total</span>: <span id="totalCount">0</span></p>
        </div>
        <div class="flex gap-2">
            <select id="sortType" onchange="handleSortChange()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 theme-golden:bg-premium-800 text-xs font-bold text-slate-600 dark:text-slate-300 theme-golden:text-gold-500 outline-none border border-transparent theme-golden:border-gold-500/30">
                <option value="newest" data-i18n="sortNew">Newest First</option>
                <option value="oldest" data-i18n="sortOld">Oldest First</option>
                <option value="az" data-i18n="sortAZ">A to Z</option>
                <option value="za" data-i18n="sortZA">Z to A</option>
                <option value="priceHigh" data-i18n="sortHigh">Price: High to Low</option>
                <option value="priceLow" data-i18n="sortLow">Price: Low to High</option>
            </select>
            <button onclick="toggleView()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 theme-golden:bg-premium-800 text-slate-500 theme-golden:text-gold-500">
                <i id="viewIcon" data-lucide="layout-grid" class="w-5 h-5"></i>
            </button>
            <button onclick="openUploadModal()" class="btn-plus p-2 rounded-xl flex items-center justify-center transition-transform hover:scale-105">
                <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
        </div>
    </div>

    <!-- Product Grid -->
    <div id="productGrid" class="p-4 grid grid-cols-2 gap-4"></div>

    <!-- ========================================== -->
    <!-- CUSTOM DELETE CONFIRMATION MODAL           -->
    <!-- ========================================== -->
    <div id="deleteModal" class="modal-overlay hidden-view" style="z-index: 200;">
        <div class="delete-modal-content">
            <div class="w-16 h-16 bg-red-50 dark:bg-red-900/20 theme-golden:bg-red-900/40 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="trash-2" class="w-8 h-8 text-red-500"></i>
            </div>
            <h2 class="text-xl font-extrabold text-slate-800 dark:text-white theme-golden:text-red-400 uppercase tracking-wide">Delete Product?</h2>
            <p class="text-slate-500 text-xs mt-2 font-medium theme-golden:text-white/70">Are you sure you want to permanently delete this product and its media? This cannot be undone.</p>
            
            <div class="flex gap-3 mt-6">
                <button onclick="closeDeleteModal()" class="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold py-3.5 rounded-xl text-sm transition-colors hover:bg-slate-200 dark:hover:bg-slate-700 theme-golden:bg-premium-800 theme-golden:text-white">Cancel</button>
                <button onclick="confirmDeleteProduct()" id="confirmDeleteBtn" class="flex-1 bg-red-500 text-white font-bold py-3.5 rounded-xl text-sm shadow-lg shadow-red-500/30 transition-transform hover:scale-[1.02]">Yes, Delete</button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- INSTANT VIEW MODAL                         -->
    <!-- ========================================== -->
    <div id="instantViewModal" class="modal-overlay hidden-view" onclick="closeInstantView(event)">
        <div class="instant-view-content" onclick="event.stopPropagation()">
            <button onclick="closeInstantView(true)" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 bg-slate-100 dark:bg-slate-800 theme-golden:bg-premium-800 p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            
            <div class="relative">
                <img id="ivImg" src="" class="w-full h-48 object-cover rounded-xl mb-4" alt="Product">
                <span id="ivStockBadge" class="absolute top-2 left-2 px-2 py-1 rounded-md text-[10px] font-bold text-white shadow-lg backdrop-blur"></span>
            </div>
            
            <p id="ivTag" class="text-[10px] font-extrabold text-gold-600 uppercase tracking-widest bg-gold-50 dark:bg-gold-900/20 py-1 px-2 rounded inline-block mb-1">Standard</p>
            <h2 id="ivTitle" class="text-xl font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-300 leading-tight">Title</h2>
            
            <div class="flex items-baseline gap-2 mt-1">
                <p id="ivPrice" class="text-xl font-black text-green-600 theme-golden:text-gold-500">₹0</p>
                <p id="ivRetail" class="text-xs font-bold text-slate-400 line-through">₹0</p>
                <p id="ivMargin" class="text-xs font-bold text-green-500 bg-green-50 dark:bg-green-900/20 px-1.5 rounded"></p>
            </div>
            
            <div class="mt-4 space-y-2 border-t border-slate-100 dark:border-slate-800 theme-golden:border-gold-500/20 pt-4">
                <p class="text-xs text-slate-600 dark:text-slate-300 theme-golden:text-gold-100/70"><strong class="theme-golden:text-gold-400">SKU:</strong> <span id="ivSku"></span></p>
                <p class="text-xs text-slate-600 dark:text-slate-300 theme-golden:text-gold-100/70"><strong class="theme-golden:text-gold-400">Quality:</strong> <span id="ivQuality"></span></p>
                <p class="text-xs text-slate-600 dark:text-slate-300 theme-golden:text-gold-100/70"><strong class="theme-golden:text-gold-400">Min Order:</strong> <span id="ivMin"></span></p>
                <p class="text-sm text-slate-700 dark:text-slate-200 mt-3 theme-golden:text-gold-100" id="ivDesc"></p>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- UPLOAD / EDIT PRODUCT MODAL                -->
    <!-- ========================================== -->
    <div id="uploadModal" class="modal-overlay hidden-view">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6 sticky top-0 bg-white dark:bg-slate-900 theme-golden:bg-premium-900 py-2 z-10 border-b border-slate-100 dark:border-slate-800 theme-golden:border-gold-500/20">
                <h2 id="modalTitle" class="text-xl font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-400" data-i18n="newProduct">New Product</h2>
                <button onclick="closeUploadModal()" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <div class="space-y-5 max-w-lg mx-auto">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 theme-golden:text-gold-500">Product Media (Max 49MB)</label>
                    <input type="file" id="prodMedia" multiple accept="image/*,video/*" class="form-input" onchange="checkFileSize(this)">
                    <p id="sizeError" class="text-red-500 text-xs font-bold mt-1 hidden-view">File exceeds 49MB limit.</p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 theme-golden:text-gold-500">Product Title *</label>
                        <input type="text" id="prodTitle" placeholder="Title" class="form-input" maxlength="150">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 theme-golden:text-gold-500">SKU / Barcode</label>
                        <input type="text" id="prodSku" placeholder="e.g. BLK-TSH-01" class="form-input">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 theme-golden:text-gold-500">Wholesale Price (₹) *</label>
                        <input type="number" id="prodPrice" placeholder="Your B2B Price" class="form-input">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 theme-golden:text-gold-500">Retail Price (MSRP ₹)</label>
                        <input type="number" id="prodRetail" placeholder="Market Price" class="form-input">
                    </div>
                </div>

                <textarea id="prodDesc" placeholder="Product Description..." rows="3" class="form-input" maxlength="10000"></textarea>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 theme-golden:text-gold-500">Category Tag</label>
                        <select id="prodTag" class="form-input">
                            <option value="Standard">Standard</option>
                            <option value="Best Seller">Best Seller</option>
                            <option value="New Arrival">New Arrival</option>
                            <option value="Clearance">Clearance</option>
                            <option value="Limited Edition">Limited Edition</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 theme-golden:text-gold-500">Min. Order Qty *</label>
                        <input type="number" id="prodMinUnit" placeholder="MOQ" class="form-input">
                    </div>
                </div>

                <!-- Dimensions & Auto-Calc -->
                <div class="p-4 rounded-xl bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 border border-slate-200 dark:border-slate-700 theme-golden:border-gold-500/20">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-bold text-slate-500 theme-golden:text-gold-500">Dimensions (Optional)</label>
                        <select id="dimUnit" class="text-xs p-1 rounded bg-white dark:bg-slate-700 theme-golden:bg-premium-900 outline-none text-slate-800 dark:text-white theme-golden:text-gold-200">
                            <option value="cm">cm</option><option value="m">m</option><option value="inch">inch</option><option value="ft">ft</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mb-2">
                        <input type="number" id="dimL" placeholder="L" oninput="calcVolume()" class="form-input text-center">
                        <input type="number" id="dimB" placeholder="B" oninput="calcVolume()" class="form-input text-center">
                        <input type="number" id="dimH" placeholder="H" oninput="calcVolume()" class="form-input text-center">
                    </div>
                    <p class="text-xs font-bold text-slate-400 theme-golden:text-gold-600/50">Calculated Volume: <span id="calcVol">0</span> <span id="volUnit">cm³</span></p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="prodWeight" placeholder="Weight (e.g. 5kg)" class="form-input">
                    <select id="prodQuality" class="form-input">
                        <option value="">Select Quality / Grade</option>
                        <option value="5 Star Premium">5 Star Premium</option>
                        <option value="4 Star">4 Star</option>
                        <option value="3 Star">3 Star</option>
                        <option value="Grade A+">Grade A+</option>
                        <option value="Grade A">Grade A</option>
                        <option value="Grade B+">Grade B+</option>
                        <option value="Standard">Standard</option>
                    </select>
                    <input type="number" id="prodStock" placeholder="Available Stock" class="form-input">
                    <input type="number" id="prodDaily" placeholder="Daily Production" class="form-input">
                </div>

                <button onclick="saveProduct()" id="saveBtn" class="w-full mt-4 bg-gradient-to-r from-green-500 to-emerald-600 theme-golden:from-gold-500 theme-golden:to-gold-600 text-white theme-golden:text-black font-bold py-4 rounded-xl shadow-lg uppercase tracking-wider text-sm transition-transform hover:scale-[1.02]">
                    Save & Publish Product
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const SUPABASE_URL = 'https://puvdfqnjzliiuupchppj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let isGridView = true;
        let allProducts = [];
        let editingProductId = null; 
        let productToDelete = null;

        const translations = {
            'en': { 'products': 'Products', 'total': 'Total', 'sortNew': 'Newest First', 'sortOld': 'Oldest First', 'sortAZ': 'A to Z', 'sortZA': 'Z to A', 'sortHigh': 'Price: High to Low', 'sortLow': 'Price: Low to High', 'newProduct': 'New Product', 'editProduct': 'Edit Product' },
            'hi': { 'products': 'उत्पाद', 'total': 'कुल', 'sortNew': 'सबसे नया', 'sortOld': 'सबसे पुराना', 'sortAZ': 'A से Z', 'sortZA': 'Z से A', 'sortHigh': 'कीमत: अधिक से कम', 'sortLow': 'कीमत: कम से अधिक', 'newProduct': 'नया उत्पाद', 'editProduct': 'उत्पाद संपादित करें' }
        };

        const illegalWords = ['scam', 'fraud', 'illegal', 'porn', 'nsfw', 'weapon', 'drugs', 'hack', 'steal'];
        function isContentSafe(text) { return !illegalWords.some(word => text.toLowerCase().includes(word)); }

        function applySettings() {
            const theme = localStorage.getItem('golden_theme') || 'system';
            const lang = localStorage.getItem('golden_language') || 'en';
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else if (theme === 'golden') document.documentElement.classList.add('dark', 'theme-golden');
            
            const savedView = localStorage.getItem('golden_prod_view');
            const savedSort = localStorage.getItem('golden_prod_sort');
            if(savedView) isGridView = (savedView === 'grid');
            if(savedSort) document.getElementById('sortType').value = savedSort;
            
            if (translations[lang]) {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if(translations[lang][key]) el.innerText = translations[lang][key];
                });
            }
            document.getElementById('viewIcon').setAttribute('data-lucide', isGridView ? 'layout-grid' : 'list');
        }

        async function savePreferencesToCloud() {
            if(!currentUser) return;
            localStorage.setItem('golden_prod_view', isGridView ? 'grid' : 'list');
            localStorage.setItem('golden_prod_sort', document.getElementById('sortType').value);
        }

        async function init() {
            applySettings();
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) return;
            currentUser = user;
            fetchProducts();
        }

        async function fetchProducts() {
            const { data, error } = await _supabase.from('products').select('*').eq('user_id', currentUser.id);
            if(data) {
                allProducts = data;
                document.getElementById('totalCount').innerText = allProducts.length;
                renderProducts();
            }
        }

        function handleSortChange() { renderProducts(); savePreferencesToCloud(); }
        function toggleView() {
            isGridView = !isGridView;
            document.getElementById('viewIcon').setAttribute('data-lucide', isGridView ? 'layout-grid' : 'list');
            lucide.createIcons();
            renderProducts();
            savePreferencesToCloud();
        }

        function getStockBadge(stockStr) {
            const stock = parseInt(stockStr);
            if(isNaN(stock)) return '';
            if(stock <= 0) return '<span class="absolute top-2 left-2 bg-red-500/90 text-white text-[10px] font-bold px-2 py-0.5 rounded backdrop-blur">Out of Stock</span>';
            if(stock <= 10) return '<span class="absolute top-2 left-2 bg-yellow-500/90 text-white text-[10px] font-bold px-2 py-0.5 rounded backdrop-blur">Low Stock</span>';
            return '<span class="absolute top-2 left-2 bg-green-500/90 text-white text-[10px] font-bold px-2 py-0.5 rounded backdrop-blur">In Stock</span>';
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const sortType = document.getElementById('sortType').value;
            
            let sorted = [...allProducts];
            if(sortType === 'newest') sorted.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            else if(sortType === 'oldest') sorted.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
            else if(sortType === 'az') sorted.sort((a,b) => a.title.localeCompare(b.title));
            else if(sortType === 'za') sorted.sort((a,b) => b.title.localeCompare(a.title));
            else if(sortType === 'priceHigh') sorted.sort((a,b) => b.price - a.price);
            else if(sortType === 'priceLow') sorted.sort((a,b) => a.price - b.price);

            grid.innerHTML = '';
            grid.className = isGridView ? 'p-4 grid grid-cols-2 gap-4' : 'p-4 flex flex-col gap-4';
            
            sorted.forEach(p => {
                const imgData = p.media_urls && p.media_urls.length > 0 ? p.media_urls[0] : null;
                const imgUrl = imgData ? _supabase.storage.from('product_media').getPublicUrl(imgData.path).data.publicUrl : 'https://via.placeholder.com/150?text=No+Image';
                const d = new Date(p.created_at);
                const stamp = `${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                const stockBadge = getStockBadge(p.stock);
                const margin = (p.retail_price && p.price) ? Math.round(((p.retail_price - p.price) / p.retail_price) * 100) : null;
                const marginTag = margin ? `<span class="text-[9px] bg-green-100 text-green-700 px-1 rounded font-bold ml-1 theme-golden:bg-green-900/40 theme-golden:text-green-400">${margin}% Margin</span>` : '';

                grid.innerHTML += `
                    <div class="product-card flex ${isGridView ? 'flex-col' : 'flex-row items-center'} group" onclick="openInstantView('${p.id}')">
                        <!-- ACTION BUTTONS -->
                        <div class="absolute top-2 right-2 flex gap-1 z-10 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editProduct('${p.id}', event)" class="p-1.5 bg-white/80 dark:bg-black/60 backdrop-blur rounded-lg text-slate-700 dark:text-slate-300 hover:text-gold-500 shadow"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                            <button onclick="requestDeleteProduct('${p.id}', event)" class="p-1.5 bg-white/80 dark:bg-black/60 backdrop-blur rounded-lg text-red-500 hover:text-red-700 shadow"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        
                        <div class="relative w-full ${isGridView ? '' : 'w-24'}">
                            ${stockBadge}
                            <img src="${imgUrl}" class="${isGridView ? 'w-full h-32' : 'w-24 h-24'} object-cover" alt="Product">
                        </div>
                        <div class="p-3 w-full flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-sm text-slate-800 dark:text-white theme-golden:text-gold-200 truncate pr-6">${p.title}</h3>
                                <p class="text-xs text-slate-400 font-mono mt-0.5 truncate">${p.sku || 'No SKU'}</p>
                                <p class="text-xs text-green-600 dark:text-green-400 font-extrabold mt-1 theme-golden:text-gold-500">₹${p.price} ${marginTag}</p>
                            </div>
                            <div class="mt-2 pt-2 border-t border-slate-100 dark:border-slate-800 theme-golden:border-gold-500/20">
                                <p class="text-[9px] text-slate-400 font-mono tracking-tighter">${stamp}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        // --- INSTANT VIEW LOGIC ---
        function openInstantView(id) {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;
            const imgData = p.media_urls && p.media_urls.length > 0 ? p.media_urls[0] : null;
            document.getElementById('ivImg').src = imgData ? _supabase.storage.from('product_media').getPublicUrl(imgData.path).data.publicUrl : 'https://via.placeholder.com/150';
            
            // Stock Badge Logic
            const stock = parseInt(p.stock);
            const badge = document.getElementById('ivStockBadge');
            if(!isNaN(stock) && stock <= 0) { badge.innerText = "Out of Stock"; badge.className = "absolute top-2 left-2 px-2 py-1 rounded-md text-[10px] font-bold text-white shadow-lg backdrop-blur bg-red-500/90"; }
            else if(!isNaN(stock) && stock <= 10) { badge.innerText = "Low Stock"; badge.className = "absolute top-2 left-2 px-2 py-1 rounded-md text-[10px] font-bold text-white shadow-lg backdrop-blur bg-yellow-500/90"; }
            else { badge.innerText = "In Stock"; badge.className = "absolute top-2 left-2 px-2 py-1 rounded-md text-[10px] font-bold text-white shadow-lg backdrop-blur bg-green-500/90"; }

            document.getElementById('ivTag').innerText = p.category_tag || 'Standard';
            document.getElementById('ivTitle').innerText = p.title;
            document.getElementById('ivSku').innerText = p.sku || 'N/A';
            document.getElementById('ivPrice').innerText = `₹${p.price}`;
            document.getElementById('ivRetail').innerText = p.retail_price ? `₹${p.retail_price}` : '';
            
            if(p.retail_price && p.price) {
                const margin = Math.round(((p.retail_price - p.price) / p.retail_price) * 100);
                document.getElementById('ivMargin').innerText = `Profit Margin: ${margin}%`;
            } else document.getElementById('ivMargin').innerText = '';

            document.getElementById('ivQuality').innerText = p.quality || 'N/A';
            document.getElementById('ivMin').innerText = p.min_unit;
            document.getElementById('ivDesc').innerText = p.description || 'No description provided.';
            
            document.getElementById('instantViewModal').classList.remove('hidden-view');
        }
        function closeInstantView(force) { if(force === true || force.target.id === 'instantViewModal') document.getElementById('instantViewModal').classList.add('hidden-view'); }

        // --- CRUD LOGIC ---
        function calcVolume() {
            const l = parseFloat(document.getElementById('dimL').value) || 0;
            const b = parseFloat(document.getElementById('dimB').value) || 0;
            const h = parseFloat(document.getElementById('dimH').value) || 0;
            document.getElementById('calcVol').innerText = (l * b * h).toFixed(2);
        }

        function openUploadModal() { 
            editingProductId = null;
            document.getElementById('modalTitle').innerText = "New Product";
            document.getElementById('saveBtn').innerText = "Save & Publish Product";
            document.querySelectorAll('input, textarea').forEach(el => el.value = ''); 
            document.getElementById('prodTag').value = 'Standard';
            document.getElementById('uploadModal').classList.remove('hidden-view'); 
        }
        function closeUploadModal() { document.getElementById('uploadModal').classList.add('hidden-view'); }

        // CUSTOM DELETE MODAL
        function requestDeleteProduct(id, e) {
            e.stopPropagation();
            productToDelete = id;
            document.getElementById('deleteModal').classList.remove('hidden-view');
        }
        function closeDeleteModal() {
            productToDelete = null;
            document.getElementById('deleteModal').classList.add('hidden-view');
        }
        async function confirmDeleteProduct() {
            if(!productToDelete) return;
            const btn = document.getElementById('confirmDeleteBtn');
            btn.innerText = "Deleting...";
            btn.disabled = true;

            const p = allProducts.find(x => x.id === productToDelete);
            
            // Delete media from storage bucket first
            if(p.media_urls && p.media_urls.length > 0) {
                const paths = p.media_urls.map(m => m.path);
                await _supabase.storage.from('product_media').remove(paths);
            }

            // Delete from database
            const { error } = await _supabase.from('products').delete().eq('id', productToDelete);
            
            btn.innerText = "Yes, Delete";
            btn.disabled = false;
            closeDeleteModal();

            if(error) alert("Error deleting: " + error.message);
            else fetchProducts(); // Refresh UI
        }

        // EDIT BUTTON CLICK
        function editProduct(id, e) {
            e.stopPropagation();
            const p = allProducts.find(x => x.id === id);
            editingProductId = id;

            document.getElementById('prodTitle').value = p.title;
            document.getElementById('prodSku').value = p.sku || '';
            document.getElementById('prodPrice').value = p.price;
            document.getElementById('prodRetail').value = p.retail_price || '';
            document.getElementById('prodTag').value = p.category_tag || 'Standard';
            document.getElementById('prodMinUnit').value = p.min_unit;
            document.getElementById('prodDesc').value = p.description || '';
            document.getElementById('prodWeight').value = p.weight || '';
            document.getElementById('prodQuality').value = p.quality || '';
            document.getElementById('prodStock').value = p.stock || '';
            document.getElementById('prodDaily').value = p.daily_production || '';
            
            if(p.dimensions) {
                document.getElementById('dimL').value = p.dimensions.l || '';
                document.getElementById('dimB').value = p.dimensions.b || '';
                document.getElementById('dimH').value = p.dimensions.h || '';
                document.getElementById('dimUnit').value = p.dimensions.unit || 'cm';
                calcVolume();
            }

            const lang = localStorage.getItem('golden_language') || 'en';
            document.getElementById('modalTitle').innerText = translations[lang] ? (translations[lang]['editProduct'] || "Edit Product") : "Edit Product";
            document.getElementById('saveBtn').innerText = "Update Product";
            document.getElementById('uploadModal').classList.remove('hidden-view');
        }

        async function saveProduct() {
            const btn = document.getElementById('saveBtn');
            const title = document.getElementById('prodTitle').value;
            const desc = document.getElementById('prodDesc').value;
            const price = document.getElementById('prodPrice').value;

            if(!title || !price) return alert("Title and Price are required.");
            if(!isContentSafe(title) || !isContentSafe(desc)) return alert("COMPLIANCE ALERT: Prohibited language detected.");

            btn.innerText = "Processing & Saving...";
            btn.disabled = true;

            const files = document.getElementById('prodMedia').files;
            let mediaData = [];

            if (editingProductId) {
                const existing = allProducts.find(x => x.id === editingProductId);
                mediaData = existing.media_urls || [];
                if (files.length > 0) {
                    if (mediaData.length > 0) {
                        const oldPaths = mediaData.map(m => m.path);
                        await _supabase.storage.from('product_media').remove(oldPaths);
                    }
                    mediaData = []; 
                }
            }

            if (files.length > 0) {
                for(let i=0; i<files.length; i++) {
                    const file = files[i];
                    const path = `${currentUser.id}/prod_${Date.now()}_${i}.${file.name.split('.').pop()}`;
                    const { error } = await _supabase.storage.from('product_media').upload(path, file);
                    if(!error) mediaData.push({ path: path, size: file.size });
                }
            }

            const productData = {
                user_id: currentUser.id,
                title: title, 
                sku: document.getElementById('prodSku').value || null,
                price: price, 
                retail_price: document.getElementById('prodRetail').value || null,
                category_tag: document.getElementById('prodTag').value || 'Standard',
                min_unit: document.getElementById('prodMinUnit').value || 1,
                description: desc,
                quality: document.getElementById('prodQuality').value,
                dimensions: {
                    l: document.getElementById('dimL').value, b: document.getElementById('dimB').value,
                    h: document.getElementById('dimH').value, unit: document.getElementById('dimUnit').value,
                    volume: document.getElementById('calcVol').innerText
                },
                stock: document.getElementById('prodStock').value || 0,
                media_urls: mediaData
            };

            let dbError;
            if (editingProductId) {
                const { error } = await _supabase.from('products').update(productData).eq('id', editingProductId);
                dbError = error;
            } else {
                const { error } = await _supabase.from('products').insert([productData]);
                dbError = error;
            }
            
            if(dbError) alert("Database Error: " + dbError.message);
            else { closeUploadModal(); fetchProducts(); }
            btn.disabled = false;
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

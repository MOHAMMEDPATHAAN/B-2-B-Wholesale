<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network - Golden's</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gold: { 400: '#FACC15', 500: '#EAB308', 600: '#CA8A04' }, premium: { 900: '#0a0a0a', 800: '#171717' } } } } }
    </script>
    <style>
        body { background: #f8fafc; padding-bottom: 90px; }
        .dark body { background: #0f172a; }
        .theme-golden body { background: radial-gradient(circle at top left, #1a1400 0%, #0a0a0a 100%); color: #fef08a; }
        .hidden-view { display: none !important; }
        
        /* Sticky Header & Search */
        .header-glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 40; position: sticky; top: 0; }
        .dark .header-glass { background: rgba(15,23,42,0.9); border-color: rgba(255,255,255,0.05); }
        .theme-golden .header-glass { background: rgba(10,10,10,0.9); border-color: rgba(234,179,8,0.2); }

        .search-bar { width: 100%; padding: 12px 16px 12px 40px; border-radius: 16px; background: #f1f5f9; border: 1px solid transparent; outline: none; font-weight: 600; font-size: 14px; transition: all 0.3s; }
        .dark .search-bar { background: #1e293b; color: white; border-color: rgba(255,255,255,0.1); }
        .theme-golden .search-bar { background: rgba(20,15,0,0.6); color: #FDE047; border-color: rgba(234,179,8,0.3); }
        .theme-golden .search-bar:focus { border-color: #FACC15; box-shadow: 0 0 15px rgba(234,179,8,0.2); }

        /* Filter Modal */
        .filter-modal { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100vh; background: white; z-index: 100; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.1); overflow-y: auto; padding-bottom: 80px; }
        .filter-modal.open { right: 0; }
        .dark .filter-modal { background: #0f172a; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .theme-golden .filter-modal { background: #0a0a0a; border-left: 1px solid rgba(234,179,8,0.3); box-shadow: -10px 0 40px rgba(234,179,8,0.15); }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.open { opacity: 1; pointer-events: auto; }

        .form-select, .form-input { width: 100%; padding: 12px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; outline: none; font-size: 14px; font-weight: 600; margin-top: 6px; }
        .dark .form-select, .dark .form-input { background: #1e293b; border-color: #334155; color: white; }
        .theme-golden .form-select, .theme-golden .form-input { background: rgba(20,15,0,0.5); border-color: rgba(234,179,8,0.3); color: #fef08a; }

        /* Horizontal Scrolling Rows */
        .row-scroll { display: flex; overflow-x: auto; gap: 16px; padding: 10px 20px 20px 20px; scroll-snap-type: x mandatory; -ms-overflow-style: none; scrollbar-width: none; }
        .row-scroll::-webkit-scrollbar { display: none; }
        
        /* Product Cards */
        .b2b-card { min-width: 240px; max-width: 240px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); scroll-snap-align: start; flex-shrink: 0; overflow: hidden; position: relative; cursor: pointer; transition: transform 0.2s; }
        .b2b-card:active { transform: scale(0.98); }
        .dark .b2b-card { background: #1e293b; }
        .theme-golden .b2b-card { background: #171717; border: 1px solid rgba(234,179,8,0.2); }

        .img-container { width: 100%; height: 160px; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .moq-badge { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); color: white; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); }
        
        .supplier-badge { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 800; color: #64748b; margin-top: 8px; }
        .dark .supplier-badge { color: #94a3b8; }
        .theme-golden .supplier-badge { color: #CA8A04; }

        /* Instant View Modal */
        .iv-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; overflow-y: auto; backdrop-filter: blur(5px); display: none; }
        .iv-modal.active { display: block; }
        .iv-content { background: white; min-height: 100vh; padding: 20px; padding-bottom: 100px; animation: slideUp 0.3s ease-out; }
        .dark .iv-content { background: #0f172a; }
        .theme-golden .iv-content { background: #0a0a0a; border-top: 1px solid rgba(234,179,8,0.3); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .loader { border: 3px solid rgba(255,255,255,0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: #EAB308; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="transition-colors duration-300">

    <!-- Header & Search Engine -->
    <div class="header-glass px-4 py-3">
        <div class="flex justify-between items-center mb-3">
            <h1 class="text-2xl font-extrabold tracking-wide uppercase" style="background: linear-gradient(to right, #FDE047, #CA8A04); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" data-i18n="network">B2B Network</h1>
            <button onclick="toggleFilters()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 theme-golden:bg-premium-800 text-slate-700 dark:text-white theme-golden:text-gold-500 shadow relative">
                <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
                <span id="filterCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden-view">0</span>
            </button>
        </div>
        
        <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400 theme-golden:text-gold-600"></i>
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search products, suppliers, prices..." class="search-bar">
            <i data-lucide="x-circle" id="clearSearch" onclick="clearSearchInput()" class="absolute right-3 top-3.5 w-5 h-5 text-slate-400 cursor-pointer hidden-view hover:text-red-500"></i>
        </div>
    </div>

    <!-- Main Feed Container -->
    <div id="loadingState" class="loader"></div>
    
    <div id="emptyState" class="hidden-view flex flex-col items-center justify-center mt-20 px-6 text-center">
        <i data-lucide="box-select" class="w-16 h-16 text-slate-300 dark:text-slate-700 theme-golden:text-gold-900 mb-4"></i>
        <h2 class="text-xl font-bold text-slate-800 dark:text-white theme-golden:text-gold-400">No Products Found</h2>
        <p class="text-sm text-slate-500 mt-2">Try adjusting your filters or search terms.</p>
    </div>

    <div id="networkFeed" class="pb-10">
        <!-- Horizontal Rows Injected Here via JS -->
    </div>

    <!-- ========================================== -->
    <!-- FILTER MODAL                               -->
    <!-- ========================================== -->
    <div id="filterOverlay" class="overlay" onclick="toggleFilters()"></div>
    <div id="filterModal" class="filter-modal">
        <div class="p-6 border-b border-slate-100 dark:border-slate-800 theme-golden:border-gold-500/20 flex justify-between items-center sticky top-0 bg-white dark:bg-slate-900 theme-golden:bg-premium-900 z-10">
            <h2 class="text-lg font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-400">Advanced Filters</h2>
            <button onclick="toggleFilters()" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        
        <div class="p-6 space-y-6">
            <!-- Price Range -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide theme-golden:text-gold-600">Wholesale Price (₹)</label>
                <div class="flex items-center gap-2 mt-2">
                    <input type="number" id="filterMinPrice" placeholder="Min" class="form-input">
                    <span class="text-slate-400 font-bold">-</span>
                    <input type="number" id="filterMaxPrice" placeholder="Max" class="form-input">
                </div>
            </div>

            <!-- Industry / Category -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide theme-golden:text-gold-600">Supplier Industry</label>
                <select id="filterIndustry" class="form-select">
                    <option value="">All Industries</option>
                    <option value="Manufacturing">Manufacturing</option>
                    <option value="Textiles">Textiles & Apparel</option>
                    <option value="Electronics">Electronics & Hardware</option>
                    <option value="Agriculture">Agriculture & Farming</option>
                    <option value="Healthcare/Pharma">Healthcare & Pharma</option>
                </select>
            </div>

            <!-- Product Grade/Quality -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide theme-golden:text-gold-600">Product Grade</label>
                <select id="filterGrade" class="form-select">
                    <option value="">Any Quality</option>
                    <option value="5 Star Premium">5 Star Premium</option>
                    <option value="Grade A+">Grade A+</option>
                    <option value="Grade A">Grade A</option>
                    <option value="Standard">Standard</option>
                </select>
            </div>

            <!-- MOQ -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide theme-golden:text-gold-600">Max Minimum Order Qty (MOQ)</label>
                <input type="number" id="filterMoq" placeholder="e.g. Show products I can buy 10 of" class="form-input">
            </div>
            
            <div class="flex gap-3 pt-4">
                <button onclick="clearFilters()" class="flex-1 py-4 font-bold text-sm text-slate-500 bg-slate-100 dark:bg-slate-800 rounded-xl theme-golden:bg-premium-800 theme-golden:text-gold-200">Reset</button>
                <button onclick="applyFilters()" class="flex-[2] py-4 font-bold text-sm text-white bg-gold-500 rounded-xl shadow-lg shadow-gold-500/30 theme-golden:text-black">Apply Filters</button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- INSTANT VIEW MODAL (B2B Details)           -->
    <!-- ========================================== -->
    <div id="ivModal" class="iv-modal" onclick="closeIV(event)">
        <div class="iv-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <div id="ivSupplierInfo" class="flex items-center gap-2 cursor-pointer bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 pr-4 rounded-full border border-slate-200 dark:border-slate-700 theme-golden:border-gold-500/30">
                    <img id="ivSupplierDp" src="" class="w-10 h-10 rounded-full object-cover">
                    <div>
                        <p id="ivSupplierName" class="text-xs font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-300">Supplier Name</p>
                        <p id="ivSupplierInd" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest theme-golden:text-gold-600">Industry</p>
                    </div>
                </div>
                <button onclick="closeIV(true)" class="text-slate-400 hover:text-red-500 bg-slate-100 dark:bg-slate-800 theme-golden:bg-premium-800 p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <img id="ivImg" src="" class="w-full h-64 object-cover rounded-2xl mb-4 border border-slate-100 dark:border-slate-800 theme-golden:border-gold-500/20">
            
            <p id="ivTag" class="text-[10px] font-extrabold text-gold-600 uppercase tracking-widest bg-gold-50 dark:bg-gold-900/20 py-1 px-2 rounded inline-block mb-2">Standard</p>
            <h2 id="ivTitle" class="text-2xl font-black text-slate-800 dark:text-white theme-golden:text-gold-300 leading-tight">Product Title</h2>
            
            <div class="flex items-baseline gap-2 mt-2">
                <p id="ivPrice" class="text-2xl font-black text-green-600 theme-golden:text-gold-500">₹0</p>
                <p class="text-xs font-bold text-slate-400">/ wholesale unit</p>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mt-6">
                <div class="bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 theme-golden:border-gold-500/20">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Min Order (MOQ)</p>
                    <p id="ivMin" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-100">0 Units</p>
                </div>
                <div class="bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 theme-golden:border-gold-500/20">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Available Stock</p>
                    <p id="ivStock" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-100">Unlimited</p>
                </div>
                <div class="bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 theme-golden:border-gold-500/20">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Quality Grade</p>
                    <p id="ivQuality" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-100">N/A</p>
                </div>
                <div class="bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 theme-golden:border-gold-500/20">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Daily Production</p>
                    <p id="ivDaily" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-100">N/A</p>
                </div>
            </div>

            <div class="mt-6">
                <h3 class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-400 mb-2">Description</h3>
                <p id="ivDesc" class="text-sm text-slate-600 dark:text-slate-300 theme-golden:text-gold-100/80 leading-relaxed"></p>
            </div>

            <!-- B2B Actions -->
            <div class="flex gap-3 mt-8">
                <button onclick="requestQuote()" class="flex-1 py-4 font-bold text-sm text-slate-700 bg-slate-100 dark:bg-slate-800 dark:text-white rounded-xl theme-golden:bg-premium-800 theme-golden:text-gold-200 border border-slate-200 dark:border-slate-700 theme-golden:border-gold-500/30">Request Quote</button>
                <button onclick="contactSupplier()" class="flex-1 py-4 font-extrabold text-sm text-black bg-gold-500 hover:bg-gold-400 rounded-xl shadow-lg shadow-gold-500/40 transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="message-square" class="w-4 h-4"></i> Contact Supplier
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // 🛑 NATIVE SUPABASE CONNECTION 🛑
        const SUPABASE_URL = 'https://puvdfqnjzliiuupchppj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProducts = [];
        let filteredProducts = [];
        let activeSupplierId = null;

        function applySettings() {
            const theme = localStorage.getItem('golden_theme') || 'system';
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else if (theme === 'golden') document.documentElement.classList.add('dark', 'theme-golden');
        }

        async function init() {
            applySettings();
            fetchNetworkProducts();
        }

        // --- FETCHING ENGINE ---
        async function fetchNetworkProducts() {
            document.getElementById('loadingState').classList.remove('hidden-view');
            
            // Safe Fetch: Uses !inner to ensure we only get products where the user HAS a completed profile
            const { data, error } = await _supabase
                .from('products')
                .select(`
                    *,
                    profiles!inner(company_name, dp_url, is_verified, industry_type, country)
                `)
                .order('created_at', { ascending: false });

            document.getElementById('loadingState').classList.add('hidden-view');

            if(error) {
                console.error("Fetch Error:", error);
                document.getElementById('emptyState').classList.remove('hidden-view');
                return;
            }

            if(data && data.length > 0) {
                allProducts = data;
                filteredProducts = data;
                renderNetwork();
            } else {
                document.getElementById('emptyState').classList.remove('hidden-view');
            }
        }

        // --- RENDERING ENGINE (Group by Industry) ---
        function renderNetwork() {
            const feed = document.getElementById('networkFeed');
            feed.innerHTML = '';
            document.getElementById('emptyState').classList.add('hidden-view');

            if(filteredProducts.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden-view');
                return;
            }

            // Group products by Industry Type
            const grouped = filteredProducts.reduce((acc, product) => {
                const industry = product.profiles?.industry_type || 'General B2B';
                if(!acc[industry]) acc[industry] = [];
                acc[industry].push(product);
                return acc;
            }, {});

            // Render each row
            for (const [industry, products] of Object.entries(grouped)) {
                
                // Build the horizontal cards
                const cardsHtml = products.map(p => {
                    const imgData = p.media_urls && p.media_urls.length > 0 ? p.media_urls[0] : null;
                    const imgUrl = imgData ? _supabase.storage.from('product_media').getPublicUrl(imgData.path).data.publicUrl : 'https://via.placeholder.com/200';
                    const verifiedBadge = p.profiles?.is_verified ? `<i data-lucide="badge-check" class="w-3 h-3 text-blue-500 inline"></i>` : '';
                    
                    return `
                        <div class="b2b-card group" onclick="openIV('${p.id}')">
                            <div class="img-container">
                                <img src="${imgUrl}" alt="Product">
                                <div class="moq-badge">MOQ: ${p.min_unit}</div>
                            </div>
                            <div class="p-4 flex flex-col justify-between">
                                <div>
                                    <h3 class="font-bold text-sm text-slate-800 dark:text-white theme-golden:text-gold-100 line-clamp-1">${p.title}</h3>
                                    <p class="text-lg font-black text-green-600 theme-golden:text-gold-500 mt-1">₹${p.price}</p>
                                </div>
                                <div class="supplier-badge border-t border-slate-100 dark:border-slate-800 theme-golden:border-gold-500/20 pt-2 mt-2">
                                    <i data-lucide="building-2" class="w-3 h-3"></i>
                                    <span class="truncate">${p.profiles?.company_name}</span> ${verifiedBadge}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Inject Row
                feed.innerHTML += `
                    <div class="mt-6">
                        <div class="px-6 flex justify-between items-end mb-2">
                            <h2 class="text-lg font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-400">${industry}</h2>
                            <span class="text-xs font-bold text-gold-500 cursor-pointer">View All</span>
                        </div>
                        <div class="row-scroll">
                            ${cardsHtml}
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        // --- SEARCH ENGINE ---
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const clearBtn = document.getElementById('clearSearch');
            
            if(query.length > 0) clearBtn.classList.remove('hidden-view');
            else clearBtn.classList.add('hidden-view');

            applyFiltersCore(query);
        }

        function clearSearchInput() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').classList.add('hidden-view');
            handleSearch();
        }

        // --- FILTER ENGINE ---
        function toggleFilters() {
            document.getElementById('filterModal').classList.toggle('open');
            document.getElementById('filterOverlay').classList.toggle('open');
        }

        function clearFilters() {
            document.getElementById('filterMinPrice').value = '';
            document.getElementById('filterMaxPrice').value = '';
            document.getElementById('filterIndustry').value = '';
            document.getElementById('filterGrade').value = '';
            document.getElementById('filterMoq').value = '';
            document.getElementById('filterCount').classList.add('hidden-view');
            
            applyFiltersCore(document.getElementById('searchInput').value.toLowerCase());
            toggleFilters();
        }

        function applyFilters() {
            applyFiltersCore(document.getElementById('searchInput').value.toLowerCase());
            toggleFilters();
        }

        function applyFiltersCore(searchQuery) {
            const minP = parseFloat(document.getElementById('filterMinPrice').value) || 0;
            const maxP = parseFloat(document.getElementById('filterMaxPrice').value) || Infinity;
            const ind = document.getElementById('filterIndustry').value;
            const grade = document.getElementById('filterGrade').value;
            const moq = parseInt(document.getElementById('filterMoq').value) || Infinity;

            let activeFilters = 0;
            if(minP > 0 || maxP !== Infinity) activeFilters++;
            if(ind) activeFilters++;
            if(grade) activeFilters++;
            if(moq !== Infinity) activeFilters++;

            const badge = document.getElementById('filterCount');
            if(activeFilters > 0) { badge.innerText = activeFilters; badge.classList.remove('hidden-view'); }
            else { badge.classList.add('hidden-view'); }

            filteredProducts = allProducts.filter(p => {
                // 1. Search Logic
                const searchable = `${p.title} ${p.description} ${p.price} ${p.profiles?.company_name}`.toLowerCase();
                const matchesSearch = searchable.includes(searchQuery);

                // 2. Filter Logic
                const priceMatch = p.price >= minP && p.price <= maxP;
                const indMatch = ind ? (p.profiles?.industry_type === ind) : true;
                const gradeMatch = grade ? (p.quality === grade) : true;
                const moqMatch = p.min_unit <= moq;

                return matchesSearch && priceMatch && indMatch && gradeMatch && moqMatch;
            });

            renderNetwork();
        }

        // --- INSTANT VIEW MODAL ---
        function openIV(id) {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;
            
            activeSupplierId = p.user_id;

            const imgData = p.media_urls && p.media_urls.length > 0 ? p.media_urls[0] : null;
            document.getElementById('ivImg').src = imgData ? _supabase.storage.from('product_media').getPublicUrl(imgData.path).data.publicUrl : 'https://via.placeholder.com/400';
            
            const dpUrl = p.profiles?.dp_url ? _supabase.storage.from('profile_pictures').getPublicUrl(p.profiles.dp_url).data.publicUrl : 'https://via.placeholder.com/150';
            document.getElementById('ivSupplierDp').src = dpUrl;
            document.getElementById('ivSupplierName').innerHTML = `${p.profiles?.company_name} ${p.profiles?.is_verified ? '<i data-lucide="badge-check" class="w-3 h-3 text-blue-500 inline"></i>' : ''}`;
            document.getElementById('ivSupplierInd').innerText = p.profiles?.industry_type || 'Business';

            document.getElementById('ivTag').innerText = p.category_tag || 'Standard';
            document.getElementById('ivTitle').innerText = p.title;
            document.getElementById('ivPrice').innerText = `₹${p.price}`;
            
            document.getElementById('ivMin').innerText = `${p.min_unit} Units`;
            document.getElementById('ivStock').innerText = p.stock > 0 ? `${p.stock} Available` : 'Made to Order';
            document.getElementById('ivQuality').innerText = p.quality || 'N/A';
            document.getElementById('ivDaily').innerText = p.daily_production ? `${p.daily_production}/day` : 'N/A';
            document.getElementById('ivDesc').innerText = p.description || 'No description provided.';
            
            document.getElementById('ivModal').classList.add('active');
            lucide.createIcons();
        }

        function closeIV(force) { if(force === true || force.target.id === 'ivModal') document.getElementById('ivModal').classList.remove('active'); }

        // --- B2B ACTIONS ---
        function contactSupplier() {
            if(!currentUser) return alert("Please log in to contact suppliers.");
            alert(`Opening secure B2B Chat with Supplier ID: ${activeSupplierId}`);
            // Future: Route to a chat module
        }

        function requestQuote() {
            if(!currentUser) return alert("Please log in.");
            alert("Quote Request Sent! The supplier will contact your registered email.");
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

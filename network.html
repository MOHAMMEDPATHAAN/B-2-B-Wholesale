<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network - Golden's</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gold: { 400: '#FACC15', 500: '#EAB308', 600: '#CA8A04' }, premium: { 900: '#0a0a0a', 800: '#171717' } } } } }
    </script>
    <style>
        body { background: #f8fafc; padding-bottom: 90px; }
        .dark body { background: #0f172a; }
        .theme-golden body { background: radial-gradient(circle at top left, #1a1400 0%, #0a0a0a 100%); color: #fef08a; }
        .hidden-view { display: none !important; }
        
        /* Sticky Header */
        .header-glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 40; position: sticky; top: 0; }
        .dark .header-glass { background: rgba(15,23,42,0.9); border-color: rgba(255,255,255,0.05); }
        .theme-golden .header-glass { background: rgba(10,10,10,0.9); border-color: rgba(234,179,8,0.2); }

        .search-bar { width: 100%; padding: 12px 16px 12px 40px; border-radius: 16px; background: #f1f5f9; border: 1px solid transparent; outline: none; font-weight: 600; font-size: 14px; transition: all 0.3s; }
        .dark .search-bar { background: #1e293b; color: white; border-color: rgba(255,255,255,0.1); }
        .theme-golden .search-bar { background: rgba(20,15,0,0.6); color: #FDE047; border-color: rgba(234,179,8,0.3); }

        /* Row Scrolling */
        .row-scroll { display: flex; overflow-x: auto; gap: 16px; padding: 10px 20px 20px 20px; scroll-snap-type: x mandatory; -ms-overflow-style: none; scrollbar-width: none; }
        .row-scroll::-webkit-scrollbar { display: none; }
        
        /* B2B Card */
        .b2b-card { min-width: 240px; max-width: 240px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); scroll-snap-align: start; flex-shrink: 0; position: relative; cursor: pointer; transition: transform 0.2s; }
        .b2b-card:active { transform: scale(0.98); }
        .dark .b2b-card { background: #1e293b; }
        .theme-golden .b2b-card { background: #171717; border: 1px solid rgba(234,179,8,0.2); }

        .img-container { width: 100%; height: 160px; position: relative; border-radius: 20px 20px 0 0; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Badges & Overlays */
        .moq-badge { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); color: white; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); }
        .action-badges { position: absolute; top: 8px; right: 8px; display: flex; gap: 6px; z-index: 10; }
        .icon-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; transition: all 0.2s; }
        .icon-btn:hover { background: rgba(0,0,0,0.8); transform: scale(1.1); }
        
        /* Active States */
        .fav-active { background: rgba(239, 68, 68, 0.2) !important; border-color: #ef4444 !important; color: #ef4444 !important; }
        .fav-active svg { fill: #ef4444; }
        .watch-active { background: rgba(59, 130, 246, 0.2) !important; border-color: #3b82f6 !important; color: #3b82f6 !important; }
        .watch-active svg { fill: #3b82f6; }
        .theme-golden .fav-active { color: #EAB308 !important; border-color: #EAB308 !important; }
        .theme-golden .fav-active svg { fill: #EAB308; }
        
        /* Full Screen Instant View Modal */
        .iv-modal { position: fixed; inset: 0; background: rgba(255,255,255,1); z-index: 200; overflow-y: auto; display: none; }
        .iv-modal.active { display: block; animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .dark .iv-modal { background: #0f172a; }
        .theme-golden .iv-modal { background: #0a0a0a; color: #fef08a; }

        .social-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 12px; background: #f1f5f9; color: #475569; transition: all 0.2s; }
        .dark .social-btn { background: #1e293b; color: #cbd5e1; }
        .theme-golden .social-btn { background: #171717; color: #CA8A04; border: 1px solid rgba(234,179,8,0.3); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .loader { border: 3px solid rgba(255,255,255,0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: #EAB308; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="transition-colors duration-300">

    <div class="header-glass px-4 py-3">
        <div class="flex justify-between items-center mb-3">
            <h1 class="text-2xl font-extrabold tracking-wide uppercase text-gold-500">B2B Network</h1>
            <button onclick="fetchNetworkProducts()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 theme-golden:bg-premium-800 text-slate-700 dark:text-white theme-golden:text-gold-500 shadow">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>
        
        <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400 theme-golden:text-gold-600"></i>
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search products, suppliers, prices..." class="search-bar">
        </div>
    </div>

    <div id="errorState" class="hidden-view p-4 bg-red-100 text-red-700 m-4 rounded-xl font-bold text-xs"></div>
    <div id="loadingState" class="loader"></div>
    
    <div id="emptyState" class="hidden-view flex flex-col items-center justify-center mt-20 px-6 text-center">
        <i data-lucide="box-select" class="w-16 h-16 text-slate-300 dark:text-slate-700 theme-golden:text-gold-900 mb-4"></i>
        <h2 class="text-xl font-bold text-slate-800 dark:text-white theme-golden:text-gold-400">Network Expanding</h2>
        <p class="text-sm text-slate-500 mt-2">No products found matching your criteria.</p>
    </div>

    <div id="networkFeed" class="pb-10"></div>

    <!-- INSTANT VIEW MODAL -->
    <div id="ivModal" class="iv-modal">
        <div class="sticky top-0 bg-white/90 dark:bg-slate-900/90 theme-golden:bg-premium-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-800 theme-golden:border-gold-500/30 p-4 flex justify-between items-center z-50">
            <button onclick="closeIV()" class="p-2 bg-slate-100 dark:bg-slate-800 theme-golden:bg-premium-800 rounded-full hover:bg-slate-200"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
            <div class="flex gap-2">
                <button id="ivWatchBtn" class="p-2 rounded-full border border-slate-200 dark:border-slate-700 theme-golden:border-gold-500/30 transition-colors"><i data-lucide="bell" class="w-5 h-5"></i></button>
                <button id="ivFavBtn" class="p-2 rounded-full border border-slate-200 dark:border-slate-700 theme-golden:border-gold-500/30 transition-colors"><i data-lucide="heart" class="w-5 h-5"></i></button>
            </div>
        </div>

        <div class="pb-24">
            <img id="ivImg" src="" class="w-full h-72 object-cover">
            <div class="p-6">
                <p id="ivTag" class="text-[10px] font-extrabold text-gold-600 uppercase tracking-widest bg-gold-50 dark:bg-gold-900/20 py-1 px-2 rounded inline-block mb-2">Category</p>
                <h2 id="ivTitle" class="text-2xl font-black text-slate-800 dark:text-white theme-golden:text-gold-300 leading-tight">Product Title</h2>
                
                <div class="flex items-baseline gap-2 mt-2">
                    <p id="ivPrice" class="text-3xl font-black text-green-600 theme-golden:text-gold-500">₹0</p>
                    <p class="text-xs font-bold text-slate-400">/ wholesale unit</p>
                </div>

                <div class="mt-6 p-4 bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 rounded-2xl border border-slate-100 dark:border-slate-700 theme-golden:border-gold-500/20">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <img id="ivSupplierDp" src="" class="w-12 h-12 rounded-full object-cover border-2 border-white dark:border-slate-700 theme-golden:border-gold-500">
                            <div>
                                <p id="ivSupplierName" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-300">Supplier Name</p>
                                <p id="ivSupplierInd" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest theme-golden:text-gold-600">Industry</p>
                            </div>
                        </div>
                        <button id="ivFollowBtn" onclick="toggleFollow()" class="px-4 py-2 bg-slate-900 dark:bg-white text-white dark:text-black theme-golden:bg-gold-500 rounded-full font-bold text-xs shadow-md transition-colors flex gap-1 items-center">
                            <i data-lucide="user-plus" class="w-3 h-3"></i> Follow
                        </button>
                    </div>
                    <div id="ivSocials" class="flex gap-2 mt-4 pt-4 border-t border-slate-200 dark:border-slate-700 theme-golden:border-gold-500/20"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mt-6">
                    <div class="bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 theme-golden:border-gold-500/20">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Min Order (MOQ)</p>
                        <p id="ivMin" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-100">0 Units</p>
                    </div>
                    <div class="bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 theme-golden:border-gold-500/20">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Available Stock</p>
                        <p id="ivStock" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-100">Unlimited</p>
                    </div>
                    <div class="bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 theme-golden:border-gold-500/20">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Quality Grade</p>
                        <p id="ivQuality" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-100">N/A</p>
                    </div>
                    <div class="bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 theme-golden:border-gold-500/20">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Dimensions</p>
                        <p id="ivDim" class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-100">N/A</p>
                    </div>
                </div>

                <div class="mt-6">
                    <h3 class="text-sm font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-400 mb-2">Description</h3>
                    <p id="ivDesc" class="text-sm text-slate-600 dark:text-slate-300 theme-golden:text-gold-100/80 leading-relaxed whitespace-pre-line"></p>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 dark:bg-slate-900/90 theme-golden:bg-premium-900/90 backdrop-blur border-t border-slate-200 dark:border-slate-800 theme-golden:border-gold-500/30 flex gap-3">
            <button onclick="alert('Routing to Direct B2B Chat...')" class="flex-1 py-4 font-extrabold text-sm text-black bg-gold-500 hover:bg-gold-400 rounded-xl shadow-lg shadow-gold-500/40 transition-colors flex items-center justify-center gap-2">
                <i data-lucide="message-circle" class="w-5 h-5"></i> Contact Supplier
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // 🛑 NATIVE SUPABASE CONNECTION 🛑
        const SUPABASE_URL = 'https://puvdfqnjzliiuupchppj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let allProducts = [];
        let filteredProducts = [];
        
        let myFavorites = new Set();
        let myWatchlist = new Set();
        let myFollows = new Set();
        let activeSupplierId = null;

        function applySettings() {
            const theme = localStorage.getItem('golden_theme') || 'system';
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else if (theme === 'golden') document.documentElement.classList.add('dark', 'theme-golden');
        }

        async function init() {
            applySettings();
            const { data: { user } } = await _supabase.auth.getUser();
            if(user) {
                currentUser = user;
                await fetchUserNetworkData();
            }
            fetchNetworkProducts();
        }

        async function fetchUserNetworkData() {
            if(!currentUser) return;
            const [{ data: favs }, { data: watch }, { data: follows }] = await Promise.all([
                _supabase.from('favorites').select('product_id').eq('user_id', currentUser.id),
                _supabase.from('watchlist').select('product_id').eq('user_id', currentUser.id),
                _supabase.from('follows').select('following_id').eq('follower_id', currentUser.id)
            ]);
            
            if(favs) favs.forEach(f => myFavorites.add(f.product_id));
            if(watch) watch.forEach(w => myWatchlist.add(w.product_id));
            if(follows) follows.forEach(f => myFollows.add(f.following_id));
        }

        async function fetchNetworkProducts() {
            document.getElementById('loadingState').classList.remove('hidden-view');
            document.getElementById('errorState').classList.add('hidden-view');
            
            // BULLETPROOF QUERY: profiles(*) ensures we fetch whatever data exists without crashing
            const { data, error } = await _supabase
                .from('products')
                .select(`*, profiles (*)`)
                .order('created_at', { ascending: false });

            document.getElementById('loadingState').classList.add('hidden-view');

            if(error) {
                document.getElementById('errorState').innerText = `Sync Error: ${error.message}`;
                document.getElementById('errorState').classList.remove('hidden-view');
                document.getElementById('emptyState').classList.remove('hidden-view');
                return;
            }

            if(data && data.length > 0) {
                allProducts = data;
                filteredProducts = data;
                renderNetwork();
            } else document.getElementById('emptyState').classList.remove('hidden-view');
        }

        function renderNetwork() {
            const feed = document.getElementById('networkFeed');
            feed.innerHTML = '';
            document.getElementById('emptyState').classList.add('hidden-view');

            if(filteredProducts.length === 0) { document.getElementById('emptyState').classList.remove('hidden-view'); return; }

            const grouped = filteredProducts.reduce((acc, product) => {
                const industry = product.profiles?.industry_type || 'Uncategorized B2B';
                if(!acc[industry]) acc[industry] = [];
                acc[industry].push(product);
                return acc;
            }, {});

            for (const [industry, products] of Object.entries(grouped)) {
                const cardsHtml = products.map(p => {
                    const imgData = p.media_urls && p.media_urls.length > 0 ? p.media_urls[0] : null;
                    const imgUrl = imgData ? _supabase.storage.from('product_media').getPublicUrl(imgData.path).data.publicUrl : 'https://via.placeholder.com/200';
                    const verifiedBadge = p.profiles?.is_verified ? `<i data-lucide="badge-check" class="w-3 h-3 text-blue-500 inline"></i>` : '';
                    
                    const isFav = myFavorites.has(p.id);
                    const isWatch = myWatchlist.has(p.id);

                    return `
                        <div class="b2b-card group" onclick="openIV('${p.id}')">
                            <div class="img-container">
                                <img src="${imgUrl}" alt="Product">
                                <div class="moq-badge">MOQ: ${p.min_unit}</div>
                                <div class="action-badges">
                                    <button onclick="toggleWatchlist('${p.id}', event)" class="icon-btn ${isWatch ? 'watch-active' : ''}" id="card_watch_${p.id}"><i data-lucide="bell" class="w-4 h-4"></i></button>
                                    <button onclick="toggleFavorite('${p.id}', event)" class="icon-btn ${isFav ? 'fav-active' : ''}" id="card_fav_${p.id}"><i data-lucide="heart" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                            <div class="p-4 flex flex-col justify-between">
                                <div>
                                    <h3 class="font-bold text-sm text-slate-800 dark:text-white theme-golden:text-gold-100 line-clamp-1">${p.title}</h3>
                                    <p class="text-lg font-black text-green-600 theme-golden:text-gold-500 mt-1">₹${p.price}</p>
                                </div>
                                <div class="flex items-center gap-2 mt-2 pt-2 border-t border-slate-100 dark:border-slate-800 theme-golden:border-gold-500/20 text-[10px] font-bold text-slate-500 theme-golden:text-gold-600">
                                    <i data-lucide="building-2" class="w-3 h-3"></i>
                                    <span class="truncate">${p.profiles?.company_name || 'Anonymous Business'}</span> ${verifiedBadge}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                feed.innerHTML += `<div class="mt-6"><div class="px-6 mb-2"><h2 class="text-lg font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-400">${industry}</h2></div><div class="row-scroll">${cardsHtml}</div></div>`;
            }
            lucide.createIcons();
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            filteredProducts = allProducts.filter(p => `${p.title} ${p.description} ${p.price} ${p.profiles?.company_name}`.toLowerCase().includes(query));
            renderNetwork();
        }

        async function toggleFavorite(productId, e) {
            if(e) e.stopPropagation();
            if(!currentUser) return alert("Please log in to save favorites.");
            
            const btnCard = document.getElementById(`card_fav_${productId}`);
            const btnModal = document.getElementById('ivFavBtn');
            
            if(myFavorites.has(productId)) {
                myFavorites.delete(productId);
                if(btnCard) btnCard.classList.remove('fav-active');
                if(btnModal) btnModal.classList.remove('fav-active');
                await _supabase.from('favorites').delete().match({ user_id: currentUser.id, product_id: productId });
            } else {
                myFavorites.add(productId);
                if(btnCard) btnCard.classList.add('fav-active');
                if(btnModal) btnModal.classList.add('fav-active');
                await _supabase.from('favorites').insert([{ user_id: currentUser.id, product_id: productId }]);
            }
        }

        async function toggleWatchlist(productId, e) {
            if(e) e.stopPropagation();
            if(!currentUser) return alert("Please log in to set alerts.");
            
            const btnCard = document.getElementById(`card_watch_${productId}`);
            const btnModal = document.getElementById('ivWatchBtn');
            
            if(myWatchlist.has(productId)) {
                myWatchlist.delete(productId);
                if(btnCard) btnCard.classList.remove('watch-active');
                if(btnModal) btnModal.classList.remove('watch-active');
                await _supabase.from('watchlist').delete().match({ user_id: currentUser.id, product_id: productId });
            } else {
                myWatchlist.add(productId);
                if(btnCard) btnCard.classList.add('watch-active');
                if(btnModal) btnModal.classList.add('watch-active');
                await _supabase.from('watchlist').insert([{ user_id: currentUser.id, product_id: productId }]);
            }
        }

        async function toggleFollow() {
            if(!currentUser) return alert("Please log in to follow suppliers.");
            if(!activeSupplierId) return;
            if(currentUser.id === activeSupplierId) return alert("You cannot follow your own business.");

            const btn = document.getElementById('ivFollowBtn');
            if(myFollows.has(activeSupplierId)) {
                myFollows.delete(activeSupplierId);
                btn.innerHTML = `<i data-lucide="user-plus" class="w-3 h-3"></i> Follow`;
                btn.classList.remove('bg-green-500', 'text-white');
                await _supabase.from('follows').delete().match({ follower_id: currentUser.id, following_id: activeSupplierId });
            } else {
                myFollows.add(activeSupplierId);
                btn.innerHTML = `<i data-lucide="user-check" class="w-3 h-3"></i> Following`;
                btn.classList.add('bg-green-500', 'text-white');
                await _supabase.from('follows').insert([{ follower_id: currentUser.id, following_id: activeSupplierId }]);
            }
            lucide.createIcons();
        }

        function openIV(id) {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;
            activeSupplierId = p.user_id;

            const favBtn = document.getElementById('ivFavBtn');
            const watchBtn = document.getElementById('ivWatchBtn');
            favBtn.onclick = () => toggleFavorite(id);
            watchBtn.onclick = () => toggleWatchlist(id);
            myFavorites.has(id) ? favBtn.classList.add('fav-active') : favBtn.classList.remove('fav-active');
            myWatchlist.has(id) ? watchBtn.classList.add('watch-active') : watchBtn.classList.remove('watch-active');

            const imgData = p.media_urls && p.media_urls.length > 0 ? p.media_urls[0] : null;
            document.getElementById('ivImg').src = imgData ? _supabase.storage.from('product_media').getPublicUrl(imgData.path).data.publicUrl : 'https://via.placeholder.com/400';
            
            document.getElementById('ivTag').innerText = p.category_tag || 'Standard B2B';
            document.getElementById('ivTitle').innerText = p.title;
            document.getElementById('ivPrice').innerText = `₹${p.price}`;
            document.getElementById('ivMin').innerText = `${p.min_unit} Units`;
            document.getElementById('ivStock').innerText = p.stock > 0 ? `${p.stock} Available` : 'Made to Order';
            document.getElementById('ivQuality').innerText = p.quality || 'N/A';
            document.getElementById('ivDesc').innerText = p.description || 'No description provided by supplier.';
            
            if (p.dimensions && p.dimensions.l) document.getElementById('ivDim').innerText = `${p.dimensions.l}x${p.dimensions.b}x${p.dimensions.h} ${p.dimensions.unit}`;
            else document.getElementById('ivDim').innerText = 'N/A';

            const prof = p.profiles || {};
            const dpUrl = prof.dp_url ? _supabase.storage.from('profile_pictures').getPublicUrl(prof.dp_url).data.publicUrl : 'https://via.placeholder.com/150';
            document.getElementById('ivSupplierDp').src = dpUrl;
            document.getElementById('ivSupplierName').innerHTML = `${prof.company_name || 'Anonymous Business'} ${prof.is_verified ? '<i data-lucide="badge-check" class="w-3 h-3 text-blue-500 inline"></i>' : ''}`;
            document.getElementById('ivSupplierInd').innerText = `${prof.industry_type || 'B2B'} • ${prof.country || 'Global'}`;

            const followBtn = document.getElementById('ivFollowBtn');
            if(myFollows.has(activeSupplierId)) {
                followBtn.innerHTML = `<i data-lucide="user-check" class="w-3 h-3"></i> Following`;
                followBtn.classList.add('bg-green-500', 'text-white');
            } else {
                followBtn.innerHTML = `<i data-lucide="user-plus" class="w-3 h-3"></i> Follow`;
                followBtn.classList.remove('bg-green-500', 'text-white');
            }

            const socialBox = document.getElementById('ivSocials');
            socialBox.innerHTML = '';
            if (prof.phone_number) socialBox.innerHTML += `<a href="https://wa.me/${prof.phone_number.replace(/\D/g,'')}" target="_blank" class="social-btn"><i data-lucide="message-circle" class="w-4 h-4"></i></a>`;
            if (prof.email) socialBox.innerHTML += `<a href="mailto:${prof.email}" class="social-btn"><i data-lucide="mail" class="w-4 h-4"></i></a>`;
            if (prof.social_links) {
                if (prof.social_links.instagram) socialBox.innerHTML += `<a href="${prof.social_links.instagram}" target="_blank" class="social-btn"><i data-lucide="instagram" class="w-4 h-4"></i></a>`;
                if (prof.social_links.youtube) socialBox.innerHTML += `<a href="${prof.social_links.youtube}" target="_blank" class="social-btn"><i data-lucide="youtube" class="w-4 h-4"></i></a>`;
                if (prof.social_links.twitter) socialBox.innerHTML += `<a href="${prof.social_links.twitter}" target="_blank" class="social-btn"><i data-lucide="twitter" class="w-4 h-4"></i></a>`;
            }
            if (socialBox.innerHTML === '') socialBox.innerHTML = `<p class="text-xs text-slate-400">No public contacts listed.</p>`;
            
            document.getElementById('ivModal').classList.add('active');
            lucide.createIcons();
        }

        function closeIV() { document.getElementById('ivModal').classList.remove('active'); activeSupplierId = null; }
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

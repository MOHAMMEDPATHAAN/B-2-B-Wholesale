<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden's Business</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { gold: { 300: '#FDE047', 400: '#FACC15', 500: '#EAB308', 600: '#CA8A04', 700: '#A16207' } }
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; overflow: hidden; background: #f8fafc; }
        .dark body { background: #0f172a; }
        .hidden-view { display: none !important; }
        
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-around; align-items: center;
            height: 70px; padding-bottom: env(safe-area-inset-bottom); z-index: 50;
        }
        .dark .bottom-bar { background: rgba(15, 23, 42, 0.95); border-top: 1px solid rgba(255,255,255,0.1); }
        
        .floating-add {
            transform: translateY(-20px);
            background: linear-gradient(135deg, #FACC15, #CA8A04);
            border-radius: 50%; width: 60px; height: 60px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 25px rgba(234, 179, 8, 0.4);
            color: white; border: 4px solid #f8fafc;
        }
        .dark .floating-add { border-color: #0f172a; }

        .text-gold-animate {
            background: linear-gradient(to right, #CA8A04 20%, #FDE047 40%, #FDE047 60%, #CA8A04 80%);
            background-size: 200% auto; color: #000;
            background-clip: text; -webkit-background-clip: text;
            text-fill-color: transparent; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* Developer Logo Animation */
        .dev-logo { position: absolute; bottom: 40px; font-size: 14px; font-weight: 800; color: #EAB308; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; }
        .text-tool { display: inline-block; overflow: hidden; animation: hideTool 4s ease-in-out infinite; white-space: nowrap; }
        .text-apos { display: inline-block; overflow: hidden; max-width: 0; opacity: 0; animation: showApos 4s ease-in-out infinite; }
        @keyframes hideTool {
            0%, 20% { max-width: 50px; opacity: 1; padding-left: 6px; }
            45%, 75% { max-width: 0px; opacity: 0; padding-left: 0px; }
            100% { max-width: 50px; opacity: 1; padding-left: 6px; }
        }
        @keyframes showApos {
            0%, 20% { max-width: 0; opacity: 0; }
            45%, 75% { max-width: 10px; opacity: 1; }
            100% { max-width: 0; opacity: 0; }
        }

        #moduleFrame { width: 100%; height: calc(100vh - 70px); border: none; background: transparent; }
        .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .spinner { border: 4px solid rgba(234,179,8,0.2); width: 50px; height: 50px; border-radius: 50%; border-left-color: #EAB308; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-100">

    <!-- ========================================== -->
    <!-- 3. MAIN APP WORKSPACE                      -->
    <!-- ========================================== -->
    <div id="appWorkspace" class="hidden-view">
        <iframe id="moduleFrame" src=""></iframe>

        <nav class="bottom-bar">
            <button onclick="loadModule('home.html', this)" class="nav-btn flex flex-col items-center gap-1 text-gold-600 w-16 transition-colors">
                <i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px] font-bold">Home</span>
            </button>
            <button onclick="loadModule('plans.html', this)" class="nav-btn flex flex-col items-center gap-1 text-slate-400 hover:text-gold-500 w-16 transition-colors">
                <i data-lucide="zap" class="w-6 h-6"></i><span class="text-[10px] font-bold">Plans</span>
            </button>
            <button onclick="loadModule('add.html', this)" class="floating-add">
                <i data-lucide="plus" class="w-8 h-8"></i>
            </button>
            <button onclick="loadModule('reels.html', this)" class="nav-btn flex flex-col items-center gap-1 text-slate-400 hover:text-gold-500 w-16 transition-colors">
                <i data-lucide="play-square" class="w-6 h-6"></i><span class="text-[10px] font-bold">Reels</span>
            </button>
            <button onclick="loadModule('profile.html', this)" class="nav-btn flex flex-col items-center gap-1 text-slate-400 hover:text-gold-500 w-16 transition-colors">
                <i data-lucide="user" class="w-6 h-6"></i><span class="text-[10px] font-bold">Profile</span>
            </button>
        </nav>
    </div>

    <!-- ========================================== -->
    <!-- SCRIPTS                                    -->
    <!-- ========================================== -->
    <script>
        lucide.createIcons();
        
        // 🛑 REPLACE WITH YOUR SUPABASE URL & ANON KEY 🛑
        const SUPABASE_URL = 'https://puvdfqnjzliiuupchppj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLogin = true;
        let selectedFile = null;

        // --- 1. STARTUP LOGIC (Flawless Memory Check) ---
        async function initApp() {
            setTimeout(async () => {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    await checkUserFlow();
                } else {
                    document.getElementById('splashScreen').classList.add('hidden-view');
                    document.getElementById('authContainer').classList.remove('hidden-view');
                    document.getElementById('stepAuth').classList.remove('hidden-view');
                }
            }, 3000); // Wait 3 seconds to show off the beautiful Splash Animation
        }

        function toggleAuthMode(loginMode) {
            isLogin = loginMode;
            document.getElementById('authError').classList.add('hidden-view');
            
            const btnLogin = document.getElementById('tabLogin');
            const btnSignup = document.getElementById('tabSignup');
            
            if (isLogin) {
                btnLogin.className = "flex-1 py-2 text-sm font-bold rounded-lg bg-white dark:bg-slate-700 shadow text-gold-600";
                btnSignup.className = "flex-1 py-2 text-sm font-bold rounded-lg text-slate-500";
                document.getElementById('authBtn').innerText = "Access Network";
            } else {
                btnSignup.className = "flex-1 py-2 text-sm font-bold rounded-lg bg-white dark:bg-slate-700 shadow text-gold-600";
                btnLogin.className = "flex-1 py-2 text-sm font-bold rounded-lg text-slate-500";
                document.getElementById('authBtn').innerText = "Create Business Account";
            }
        }

        function showError(msg, isSuccess = false) {
            const errEl = document.getElementById('authError');
            errEl.innerText = msg;
            errEl.className = `text-sm text-center mb-4 font-bold ${isSuccess ? 'text-green-500' : 'text-red-500'}`;
            errEl.classList.remove('hidden-view');
        }

        async function handleAuth() {
            const identifier = document.getElementById('emailOrPhone').value.trim();
            const password = document.getElementById('password').value;
            document.getElementById('authError').classList.add('hidden-view');
            
            if(!identifier || !password) return showError("Please enter login details");

            document.getElementById('authBtn').innerText = "Verifying...";
            const isEmail = identifier.includes('@');
            const credentials = isEmail ? { email: identifier, password: password } : { phone: identifier, password: password };

            if (isLogin) {
                const { error } = await _supabase.auth.signInWithPassword(credentials);
                if (error) {
                    showError("Incorrect login details.");
                    document.getElementById('authBtn').innerText = "Access Network";
                } else await checkUserFlow();
            } else {
                const { error } = await _supabase.auth.signUp(credentials);
                if (error) {
                    showError(error.message);
                    document.getElementById('authBtn').innerText = "Create Business Account";
                } else await checkUserFlow();
            }
        }

        // --- 3. STRICT ONE-TIME ONBOARDING FLOW ---
        async function checkUserFlow() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return;

            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            
            document.getElementById('splashScreen').classList.add('hidden-view');
            document.getElementById('authContainer').classList.remove('hidden-view');
            document.getElementById('stepAuth').classList.add('hidden-view');
            
            // STRICT LOGIC: If document is missing, ALWAYS ask.
            if (!profile || !profile.document_path) {
                document.getElementById('stepDocs').classList.remove('hidden-view');
                document.getElementById('stepProfile').classList.add('hidden-view');
            } 
            // STRICT LOGIC: If Document exists but Name is missing, ALWAYS ask profile.
            else if (!profile.company_name) {
                document.getElementById('stepDocs').classList.add('hidden-view');
                document.getElementById('stepProfile').classList.remove('hidden-view');
            } 
            // SUCCESS: Setup is complete. Never ask again.
            else {
                launchApp(false); 
            }
        }

        function documentSelected() {
            const fileInput = document.getElementById('compDoc');
            if (fileInput.files.length > 0) {
                selectedFile = fileInput.files[0];
                document.getElementById('uploadText').innerText = selectedFile.name;
                const docBtn = document.getElementById('docBtn');
                docBtn.disabled = false;
                docBtn.className = "w-full bg-gradient-to-r from-gold-500 to-gold-600 text-white font-bold py-3.5 rounded-xl uppercase tracking-wider text-sm shadow-lg shadow-gold-500/30 hover:scale-[1.02] transition-transform";
            }
        }

        async function submitDocument() {
            if (!selectedFile) return;
            const docBtn = document.getElementById('docBtn');
            docBtn.innerText = "Securing File...";
            docBtn.disabled = true;

            const { data: { user } } = await _supabase.auth.getUser();
            const filePath = `${user.id}/verification_${Date.now()}.${selectedFile.name.split('.').pop()}`;

            const { error: uploadError } = await _supabase.storage
                .from('business_documents')
                .upload(filePath, selectedFile, { upsert: true });

            if (uploadError) {
                alert("Upload failed. Make sure you ran the SQL policy fix!");
                docBtn.innerText = "Upload & Continue";
                docBtn.disabled = false;
                return;
            }

            // Lock it into profile database permanently
            await _supabase.from('profiles').upsert({ id: user.id, document_path: filePath });
            
            document.getElementById('stepDocs').classList.add('hidden-view');
            document.getElementById('stepProfile').classList.remove('hidden-view');
        }

        async function saveProfileAndEnter() {
            const btn = document.getElementById('finishBtn');
            
            const data = {
                company_name: document.getElementById('compName').value,
                ceo_name: document.getElementById('ceoName').value,
                phone_number: document.getElementById('mobile').value,
                industry_type: document.getElementById('industry').value,
                core_product_category: document.getElementById('coreProduct').value,
                daily_production: document.getElementById('production').value,
                tax_id: document.getElementById('taxId').value,
                company_address: document.getElementById('address').value,
                year_founded: document.getElementById('founded').value,
                employee_count: document.getElementById('employees').value,
                verification_status: 'reviewing'
            };

            for (const key in data) {
                if (!data[key]) return alert("All fields are strictly required.");
            }

            btn.innerText = "Finalizing...";
            const { data: { user } } = await _supabase.auth.getUser();

            const { error } = await _supabase.from('profiles').upsert({ id: user.id, ...data });

            if(error) {
                alert("Error: " + error.message);
                btn.innerText = "Complete Golden Setup";
                return;
            }

            launchApp(true); // true means it's their first time, so show popup!
        }

        function launchApp(isFirstTime) {
            document.getElementById('authContainer').classList.add('hidden-view');
            document.getElementById('appWorkspace').classList.remove('hidden-view');
            
            if(isFirstTime) {
                document.getElementById('trialPopup').classList.remove('hidden-view');
            }
            loadModule('home.html', document.querySelector('.nav-btn'));
        }

        function closePopup() {
            document.getElementById('trialPopup').classList.add('hidden-view');
        }

        function loadModule(filename, element) {
            document.getElementById('moduleFrame').src = filename;
            if (element) {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('text-gold-600');
                    btn.classList.add('text-slate-400');
                });
                if(!element.classList.contains('floating-add')) {
                    element.classList.remove('text-slate-400');
                    element.classList.add('text-gold-600');
                }
            }
        }
        
        window.signOutApp = async function() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        initApp();
    </script>
</body>
</html>

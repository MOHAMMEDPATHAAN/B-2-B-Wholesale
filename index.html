<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden's Business | Global B2B</title>
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --gold-primary: #EAB308;
            --gold-light: #FDE047;
            --gold-dark: #A16207;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            background-color: #0f172a; /* Default to Dark for Splash */
            color: white;
            height: 100vh;
            width: 100vw;
        }

        /* DEVELOPER LOGO ANIMATION */
        .dev-logo-container {
            position: relative;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(234, 179, 8, 0.4)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(234, 179, 8, 0.8)); }
        }

        .gold-animate {
            background: linear-gradient(90deg, #ca8a04, #facc15, #ca8a04);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Navigation Transitions */
        .hidden-view { display: none !important; }
        
        /* Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .dark .bottom-bar {
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .floating-add {
            background: linear-gradient(135deg, #EAB308, #A16207);
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 20px rgba(234, 179, 8, 0.4);
            transform: translateY(-25px);
            border: 4px solid white;
        }
        .dark .floating-add { border-color: #0f172a; }

        iframe {
            width: 100%;
            height: calc(100vh - 75px);
            border: none;
            background: transparent;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center transition-colors duration-500">

    <!-- 1. SPLASH SCREEN & DEVELOPER ANIMATION -->
    <div id="splashScreen" class="fixed inset-0 z-[1000] flex flex-col items-center justify-center bg-slate-900">
        <div class="dev-logo-container mb-6">
            <!-- Your Developer Logo (SVG Crown/G) -->
            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#EAB308" />
                <circle cx="12" cy="12" r="10" stroke="#EAB308" stroke-width="0.5" stroke-dasharray="4 4" />
            </svg>
        </div>
        <h1 class="text-2xl font-extrabold gold-animate tracking-tighter uppercase">Golden's Business</h1>
        <p class="text-slate-500 text-[10px] mt-4 font-bold tracking-[0.3em] uppercase">Global B2B Network</p>
        
        <!-- Simple Progress Bar -->
        <div class="w-48 h-1 bg-slate-800 rounded-full mt-8 overflow-hidden">
            <div id="loadingBar" class="h-full bg-gold-500 w-0 transition-all duration-300"></div>
        </div>
    </div>

    <!-- 2. AUTHENTICATION FLOW -->
    <div id="authSection" class="w-full max-w-md px-8 hidden-view flex flex-col items-center">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-extrabold text-white mb-2">Welcome</h2>
            <p class="text-slate-400 font-medium">Verify your identity to enter the network.</p>
        </div>
        
        <div class="w-full space-y-4">
            <div class="relative">
                <i data-lucide="mail" class="absolute left-4 top-4 w-5 h-5 text-slate-500"></i>
                <input type="email" id="authEmail" placeholder="Business Email" class="w-full bg-slate-800 p-4 pl-12 rounded-2xl border border-slate-700 outline-none focus:border-gold-500 transition-all">
            </div>
            <div class="relative">
                <i data-lucide="lock" class="absolute left-4 top-4 w-5 h-5 text-slate-500"></i>
                <input type="password" id="authPass" placeholder="Password" class="w-full bg-slate-800 p-4 pl-12 rounded-2xl border border-slate-700 outline-none focus:border-gold-500 transition-all">
            </div>
            <button onclick="handleAuth()" id="authBtn" class="w-full bg-gold-500 text-slate-900 font-extrabold py-4 rounded-2xl shadow-xl shadow-gold-500/20 active:scale-95 transition-transform">
                Get Started
            </button>
            <p id="authSwitch" onclick="toggleAuthMode()" class="text-center text-sm text-slate-500 font-bold cursor-pointer mt-4 hover:text-gold-500">Don't have an account? Sign Up</p>
        </div>
    </div>

    <!-- 3. GLOBAL PROFILE SETUP (Location Based) -->
    <div id="stepProfile" class="w-full max-w-md hidden-view flex flex-col h-[90vh] text-slate-800 dark:text-white">
        <div class="text-center mt-6 mb-4">
            <h1 class="text-xl font-extrabold gold-animate tracking-wide uppercase">Golden's Business</h1>
            <p class="text-xs font-bold text-slate-500 mt-1">GLOBAL SETUP STEP</p>
        </div>
        
        <div class="space-y-4 overflow-y-auto px-4 pb-24 flex-1">
            <p class="text-[10px] font-extrabold text-gold-600 uppercase tracking-widest bg-gold-50 dark:bg-gold-900/20 py-1 px-2 rounded inline-block">1. Identity & Location</p>
            <input type="text" id="compName" placeholder="Registered Company Name *" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-gold-500 outline-none">
            <input type="text" id="ceoName" placeholder="CEO / Manager Name *" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-gold-500 outline-none">
            <input type="tel" id="mobile" placeholder="Business Mobile Number *" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-gold-500 outline-none">
            
            <select id="country" onchange="updateTaxLabel()" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-gold-500 outline-none font-bold text-gold-600">
                <option value="">Select Country / Jurisdiction *</option>
                <option value="US">United States</option>
                <option value="UK">United Kingdom</option>
                <option value="EU">European Union</option>
                <option value="IN">India</option>
                <option value="AU">Australia</option>
                <option value="CA">Canada</option>
                <option value="SG">Singapore</option>
                <option value="AE">UAE</option>
                <option value="OTHER">Other Region</option>
            </select>

            <p class="text-[10px] font-extrabold text-gold-600 uppercase tracking-widest bg-gold-50 dark:bg-gold-900/20 py-1 px-2 rounded inline-block mt-4">2. Verification Data</p>
            <input type="text" id="taxId" placeholder="Tax Identification Number *" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-gold-500 outline-none">
            <input type="text" id="address" placeholder="Headquarters Address *" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-gold-500 outline-none">
        </div>
        
        <div class="p-4 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 absolute bottom-0 left-0 right-0 z-10">
            <button onclick="saveProfileAndEnter()" id="finishBtn" class="w-full bg-gradient-to-r from-gold-500 to-gold-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-gold-500/30 uppercase tracking-wider text-sm">
                Complete Golden Setup
            </button>
        </div>
    </div>

    <!-- 4. MAIN APP WORKSPACE -->
    <div id="appWorkspace" class="hidden-view w-full h-full">
        <iframe id="moduleFrame" src="home.html"></iframe>

        <nav class="bottom-bar">
            <button onclick="loadModule('home.html', this)" class="nav-btn flex flex-col items-center gap-1 text-gold-600 w-16">
                <i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px] font-bold">Home</span>
            </button>
            <button onclick="loadModule('reels.html', this)" class="nav-btn flex flex-col items-center gap-1 text-slate-400 w-16">
                <i data-lucide="play-square" class="w-6 h-6"></i><span class="text-[10px] font-bold">Reels</span>
            </button>
            <button onclick="loadModule('add.html', this)" class="floating-add">
                <i data-lucide="plus" class="w-8 h-8"></i>
            </button>
            <button onclick="loadModule('plans.html', this)" class="nav-btn flex flex-col items-center gap-1 text-slate-400 w-16">
                <i data-lucide="zap" class="w-6 h-6"></i><span class="text-[10px] font-bold">Plans</span>
            </button>
            <button onclick="loadModule('profile.html', this)" class="nav-btn flex flex-col items-center gap-1 text-slate-400 w-16">
                <i data-lucide="user" class="w-6 h-6"></i><span class="text-[10px] font-bold">Profile</span>
            </button>
        </nav>
    </div>

    <script>
        // --- 1. SUPABASE CONFIG ---
        const supabaseUrl = 'https://puvdfqnjzliiuupchppj.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        window._supabase = _supabase; // Expose to modules

        // --- 2. GLOBAL STATE ---
        let isSignUp = false;
        let currentTaxType = "TIN";

        // --- 3. INIT & ANIMATION ---
        window.onload = () => {
            lucide.createIcons();
            const bar = document.getElementById('loadingBar');
            let progress = 0;
            const int = setInterval(() => {
                progress += 5;
                bar.style.width = progress + '%';
                if(progress >= 100) {
                    clearInterval(int);
                    checkUserSession();
                }
            }, 50);
        };

        async function checkUserSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            document.getElementById('splashScreen').classList.add('hidden-view');
            
            if(session) {
                const { data: profile } = await _supabase.from('profiles').select('*').eq('id', session.user.id).single();
                if(profile && profile.company_name) {
                    launchApp(profile.theme === 'dark');
                } else {
                    document.getElementById('stepProfile').classList.remove('hidden-view');
                    document.body.classList.add('bg-white', 'dark:bg-slate-900');
                }
            } else {
                document.getElementById('authSection').classList.remove('hidden-view');
            }
        }

        // --- 4. AUTH HANDLERS ---
        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('authBtn').innerText = isSignUp ? "Create Business Account" : "Get Started";
            document.getElementById('authSwitch').innerText = isSignUp ? "Already have an account? Sign In" : "Don't have an account? Sign Up";
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            const btn = document.getElementById('authBtn');
            
            if(!email || !pass) return alert("Fill all fields.");
            btn.innerText = "Processing...";

            let result;
            if(isSignUp) {
                result = await _supabase.auth.signUp({ email, password: pass });
            } else {
                result = await _supabase.auth.signInWithPassword({ email, password: pass });
            }

            if(result.error) {
                alert(result.error.message);
                btn.innerText = isSignUp ? "Create Account" : "Get Started";
            } else {
                checkUserSession();
            }
        }

        // --- 5. PROFILE & LOCATION ---
        function updateTaxLabel() {
            const country = document.getElementById('country').value;
            const taxInput = document.getElementById('taxId');
            const taxMap = {
                'US': { label: 'EIN (Employer ID Number) *', type: 'EIN' },
                'UK': { label: 'VAT or UTR Number *', type: 'VAT' },
                'IN': { label: 'GSTIN (GST Number) *', type: 'GSTIN' },
                'AU': { label: 'ABN Number *', type: 'ABN' },
                'CA': { label: 'Business Number (BN) *', type: 'BN' },
                'SG': { label: 'UEN (Unique Entity No) *', type: 'UEN' },
                'AE': { label: 'TRN Number *', type: 'TRN' },
                'OTHER': { label: 'Local Tax ID (TIN) *', type: 'TIN' }
            };
            if(taxMap[country]) {
                taxInput.placeholder = taxMap[country].label;
                currentTaxType = taxMap[country].type;
            }
        }

        async function saveProfileAndEnter() {
            const { data: { user } } = await _supabase.auth.getUser();
            const data = {
                id: user.id,
                company_name: document.getElementById('compName').value,
                ceo_name: document.getElementById('ceoName').value,
                phone_number: document.getElementById('mobile').value,
                country: document.getElementById('country').value,
                tax_id: document.getElementById('taxId').value,
                tax_id_type: currentTaxType,
                company_address: document.getElementById('address').value,
                language: 'en',
                theme: 'dark'
            };

            const { error } = await _supabase.from('profiles').upsert(data);
            if(!error) launchApp(true);
            else alert(error.message);
        }

        // --- 6. APP CORE LOGIC ---
        function launchApp(isDark) {
            document.getElementById('authSection').classList.add('hidden-view');
            document.getElementById('stepProfile').classList.add('hidden-view');
            document.getElementById('appWorkspace').classList.remove('hidden-view');
            changeTheme(isDark ? 'dark' : 'light');
        }

        function loadModule(url, btn) {
            document.getElementById('moduleFrame').src = url;
            // Update UI Active State
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('text-gold-600');
                b.classList.add('text-slate-400');
            });
            btn.classList.remove('text-slate-400');
            btn.classList.add('text-gold-600');
        }

        function changeTheme(mode) {
            if (mode === 'dark') {
                document.documentElement.classList.add('dark');
                document.body.classList.replace('bg-white', 'bg-slate-900');
            } else {
                document.documentElement.classList.remove('dark');
                document.body.classList.replace('bg-slate-900', 'bg-white');
            }
        }

        async function signOutApp() {
            await _supabase.auth.signOut();
            window.location.reload();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden's Business | Global B2B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { --gold: #EAB308; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; background: #0f172a; transition: background 0.5s ease; }

        /* --- PREMIUM DEVELOPER LOGO ANIMATION --- */
        .gold-vault {
            position: relative; width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center;
        }
        .vault-ring {
            position: absolute; border: 2px dashed var(--gold);
            border-radius: 50%; animation: rotate 10s linear infinite;
        }
        .ring-1 { width: 100px; height: 100px; opacity: 0.3; }
        .ring-2 { width: 120px; height: 120px; opacity: 0.1; animation-direction: reverse; }
        .gold-logo-svg {
            z-index: 10; filter: drop-shadow(0 0 15px rgba(234, 179, 8, 0.6));
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .hidden-view { display: none !important; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        
        iframe { width: 100%; height: calc(100vh - 80px); border: none; background: transparent; }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

    <!-- 1. SPLASH & DEV LOGO -->
    <div id="splashScreen" class="fixed inset-0 z-[1000] flex flex-col items-center justify-center bg-slate-950">
        <div class="gold-vault mb-6">
            <div class="vault-ring ring-1"></div>
            <div class="vault-ring ring-2"></div>
            <svg class="gold-logo-svg" width="60" height="60" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="url(#goldGradient)" />
                <defs>
                    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FDE047" />
                        <stop offset="100%" style="stop-color:#A16207" />
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 via-yellow-500 to-yellow-700 uppercase tracking-widest">Golden's Business</h1>
        <div class="w-40 h-0.5 bg-slate-800 mt-6 overflow-hidden rounded-full"><div id="loadProgress" class="h-full bg-gold-500 w-0 transition-all"></div></div>
    </div>

    <!-- 2. AUTHENTICATION -->
    <div id="authSection" class="w-full max-w-md px-8 hidden-view">
        <div class="text-center mb-10">
            <h2 id="authTitle" class="text-3xl font-extrabold text-white">Secure Access</h2>
            <p id="authDesc" class="text-slate-500 text-sm mt-2">Enter credentials to join the B2B Vault.</p>
        </div>
        
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Corporate Email" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-white outline-none focus:border-gold-500">
            <input type="password" id="pass" placeholder="Master Password" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-white outline-none focus:border-gold-500">
            
            <button onclick="handleAuth()" id="authBtn" class="w-full bg-gold-500 text-slate-950 font-black py-4 rounded-2xl shadow-xl shadow-gold-500/20 uppercase tracking-tighter">Enter Network</button>
            
            <div class="flex justify-between px-2">
                <span onclick="toggleMode()" id="toggleText" class="text-xs font-bold text-slate-500 cursor-pointer hover:text-gold-500">New? Register Company</span>
                <span onclick="forgotPassword()" class="text-xs font-bold text-gold-600 cursor-pointer">Recover Access?</span>
            </div>
        </div>
    </div>

    <!-- 3. MANDATORY GLOBAL SETUP -->
    <div id="setupView" class="w-full max-w-lg px-6 hidden-view h-screen overflow-y-auto pt-10 pb-32">
        <h2 class="text-2xl font-black text-white mb-6 uppercase">Global Registration</h2>
        <div class="space-y-5">
            <div><label class="text-[10px] text-slate-500 font-bold uppercase">Legal Identity</label>
            <input type="text" id="s_comp" oninput="this.value=this.value.replace(/[^\w\s]/gi, '')" placeholder="Company Name (No Emojis)" class="w-full bg-slate-900 p-4 rounded-xl text-white border border-slate-800"></div>
            
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="s_ceo" placeholder="CEO Name" class="bg-slate-900 p-4 rounded-xl text-white border border-slate-800">
                <input type="tel" id="s_phone" oninput="this.value=this.value.replace(/[^0-9]/g,'')" placeholder="Phone (Digits Only)" class="bg-slate-900 p-4 rounded-xl text-white border border-slate-800">
            </div>

            <select id="s_country" onchange="syncTax()" class="w-full bg-slate-900 p-4 rounded-xl text-gold-500 font-bold border border-slate-800">
                <option value="US">USA (EIN)</option>
                <option value="UK">UK (VAT)</option>
                <option value="IN" selected>India (GSTIN)</option>
            </select>

            <input type="text" id="s_tax" placeholder="Tax ID" class="w-full bg-slate-900 p-4 rounded-xl text-white border border-slate-800">

            <div class="p-5 border-2 border-dashed border-slate-800 rounded-2xl text-center bg-slate-900/50">
                <p class="text-xs text-slate-400 mb-3">MANDATORY: Registration Certificate (PDF/JPG)</p>
                <input type="file" id="s_doc" class="hidden" onchange="document.getElementById('docName').innerText=this.files[0].name">
                <button onclick="document.getElementById('s_doc').click()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold">Choose File</button>
                <p id="docName" class="text-[10px] text-gold-500 mt-2"></p>
            </div>
            
            <button onclick="completeSetup()" id="setupBtn" class="w-full bg-gold-500 text-slate-950 font-black py-4 rounded-2xl uppercase tracking-widest mt-6">Submit for Verification</button>
        </div>
    </div>

    <!-- 4. APP WORKSPACE -->
    <div id="workspace" class="hidden-view w-full h-full bg-white dark:bg-slate-950">
        <iframe id="mainFrame" src="home.html"></iframe>
        <nav class="fixed bottom-0 left-0 right-0 h-20 glass-panel flex justify-around items-center px-4 border-t border-slate-200 dark:border-slate-800">
            <button onclick="nav('home.html',this)" class="nav-btn text-gold-500"><i data-lucide="home"></i></button>
            <button onclick="nav('reels.html',this)" class="nav-btn text-slate-400"><i data-lucide="play-square"></i></button>
            <button class="w-14 h-14 bg-gold-500 rounded-2xl -translate-y-6 flex items-center justify-center shadow-lg"><i data-lucide="plus" class="text-slate-950"></i></button>
            <button onclick="nav('plans.html',this)" class="nav-btn text-slate-400"><i data-lucide="zap"></i></button>
            <button onclick="nav('profile.html',this)" class="nav-btn text-slate-400"><i data-lucide="user"></i></button>
        </nav>
    </div>

    <script>
        const supabaseUrl = 'https://puvdfqnjzliiuupchppj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        window._supabase = _supabase;

        let isSignUp = false;

        window.onload = () => {
            lucide.createIcons();
            let p = 0;
            const bar = document.getElementById('loadProgress');
            const timer = setInterval(() => {
                p += 4; bar.style.width = p + '%';
                if(p >= 100) { clearInterval(timer); checkSession(); }
            }, 30);
        };

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            document.getElementById('splashScreen').classList.add('hidden-view');
            if(session) {
                const { data } = await _supabase.from('profiles').select('*').eq('id', session.user.id).single();
                if(data && data.company_name) launchApp(data);
                else document.getElementById('setupView').classList.remove('hidden-view');
            } else {
                document.getElementById('authSection').classList.remove('hidden-view');
            }
        }

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('authTitle').innerText = isSignUp ? "Create Vault" : "Secure Access";
            document.getElementById('authBtn').innerText = isSignUp ? "Open Account" : "Enter Network";
            document.getElementById('toggleText').innerText = isSignUp ? "Have login? Sign In" : "New? Register Company";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return;
            
            const btn = document.getElementById('authBtn'); btn.innerText = "Verifying...";
            const { data, error } = isSignUp ? await _supabase.auth.signUp({email, password:pass}) : await _supabase.auth.signInWithPassword({email, password:pass});
            
            if(error) { alert(error.message); btn.innerText = "Retry"; }
            else checkSession();
        }

        async function forgotPassword() {
            const email = prompt("Enter registered business email for Magic Link:");
            if(email) {
                await _supabase.auth.resetPasswordForEmail(email);
                alert("Magic Link sent! Check your inbox.");
            }
        }

        async function completeSetup() {
            const btn = document.getElementById('setupBtn');
            const file = document.getElementById('s_doc').files[0];
            if(!file) return alert("Registration Document is Mandatory.");
            
            btn.innerText = "Uploading Documents...";
            const { data: { user } } = await _supabase.auth.getUser();
            
            const filePath = `${user.id}/signup_doc_${Date.now()}`;
            await _supabase.storage.from('verification_docs').upload(filePath, file);

            const payload = {
                id: user.id,
                company_name: document.getElementById('s_comp').value,
                ceo_name: document.getElementById('s_ceo').value,
                phone_number: document.getElementById('s_phone').value,
                country: document.getElementById('s_country').value,
                tax_id: document.getElementById('s_tax').value,
                signup_doc_url: filePath,
                verification_status: 'reviewing'
            };

            const { error } = await _supabase.from('profiles').upsert(payload);
            if(!error) {
                alert("SUCCESS: Document is under review. Your profile will be verified within 24 hours.");
                launchApp(payload);
            }
        }

        function launchApp(profile) {
            document.getElementById('setupView').classList.add('hidden-view');
            document.getElementById('authSection').classList.add('hidden-view');
            document.getElementById('workspace').classList.remove('hidden-view');
            syncTheme(profile.theme || 'dark');
        }

        function nav(url, el) {
            document.getElementById('mainFrame').src = url;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-gold-500', 'text-slate-400'));
            el.classList.replace('text-slate-400', 'text-gold-500');
        }

        // --- GLOBAL LISTENERS FOR IFRAME SETTINGS ---
        window.syncTheme = (mode) => {
            if(mode === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        };

        window.syncLanguage = (lang) => {
            // Logic to reload translations in shell if needed
            console.log("Shell language switched to:", lang);
        };
    </script>
</body>
</html>

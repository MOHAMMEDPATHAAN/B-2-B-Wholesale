<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni B2B Engine</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hidden-view { display: none !important; }
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-bottom: env(safe-area-inset-bottom);
        }
        @media (prefers-color-scheme: dark) {
            .bottom-nav { background: rgba(15, 23, 42, 0.8); border-top: 1px solid rgba(255,255,255,0.1); }
        }
        .step-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- 1. AUTHENTICATION (Glassmorphism UI) -->
    <div id="authView" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white dark:bg-slate-900 p-8 rounded-[2rem] shadow-2xl border border-slate-100 dark:border-slate-800">
            <div class="flex flex-col items-center mb-8">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl rotate-12 flex items-center justify-center mb-4 shadow-lg shadow-indigo-500/40">
                    <i data-lucide="zap" class="text-white w-6 h-6 -rotate-12"></i>
                </div>
                <h1 class="text-2xl font-bold">Omni B2B</h1>
                <p class="text-slate-400 text-sm">Scale your media engines</p>
            </div>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Business Email" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <button onclick="handleAuth()" id="authBtn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-500/30 active:scale-95 transition-all">
                    Enter Workspace
                </button>
                <p id="authMsg" class="text-center text-xs font-medium text-slate-500 mt-4 cursor-pointer" onclick="toggleMode()">New here? Create Account</p>
            </div>
        </div>
    </div>

    <!-- 2. INTERACTIVE ENTRANCE (ONBOARDING) -->
    <div id="onboardingView" class="hidden-view min-h-screen flex items-center justify-center p-8">
        <div class="step-card w-full max-w-md text-center">
            <div class="mb-6 inline-flex p-4 bg-indigo-100 dark:bg-indigo-900/30 rounded-full text-indigo-600">
                <i data-lucide="user-check" class="w-8 h-8"></i>
            </div>
            <h2 class="text-3xl font-bold mb-2">Final Step</h2>
            <p class="text-slate-500 mb-8">Let's personalize your dashboard</p>
            
            <div class="text-left space-y-4 mb-8">
                <label class="block text-xs font-bold text-slate-400 uppercase ml-2">Your Business Name</label>
                <input type="text" id="setupCompanyName" placeholder="e.g. Skyline Media" class="w-full p-4 rounded-2xl bg-white dark:bg-slate-900 shadow-sm outline-none border border-slate-200 dark:border-slate-800 focus:border-indigo-500">
            </div>
            
            <button onclick="finishSetup()" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all">
                Launch My Tools
            </button>
        </div>
    </div>

    <!-- 3. MAIN DASHBOARD WITH BOTTOM BAR -->
    <div id="mainView" class="hidden-view pb-24">
        <header class="p-6 flex justify-between items-center">
            <div>
                <p class="text-xs font-bold text-indigo-600 uppercase tracking-widest">Enterprise</p>
                <h1 id="displayCompanyName" class="text-2xl font-bold">Dashboard</h1>
            </div>
            <div class="w-12 h-12 bg-slate-200 dark:bg-slate-800 rounded-full flex items-center justify-center font-bold">
                <i data-lucide="user" class="w-5 h-5"></i>
            </div>
        </header>

        <main class="px-6 space-y-6">
            <!-- Stats Row -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-indigo-600 p-6 rounded-[2rem] text-white">
                    <p class="text-xs opacity-70">Plan</p>
                    <h3 id="planDisplay" class="text-xl font-bold">...</h3>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-800 text-center">
                    <p class="text-xs text-slate-400">Status</p>
                    <h3 class="text-xl font-bold text-green-500">Active</h3>
                </div>
            </div>

            <!-- Content Area (HTML Injection Target) -->
            <div id="workspaceArea" class="bg-white dark:bg-slate-900 min-h-[400px] rounded-[2.5rem] border border-slate-100 dark:border-slate-800 p-6 flex flex-col items-center justify-center">
                <div class="w-16 h-16 bg-slate-50 dark:bg-slate-800 rounded-2xl flex items-center justify-center mb-4">
                    <i data-lucide="layout-template" class="text-slate-400"></i>
                </div>
                <p class="text-slate-400 text-sm">Your module will load here</p>
            </div>
        </main>

        <!-- BOTTOM NAV BAR -->
        <nav class="bottom-nav h-20 flex justify-around items-center px-4">
            <button class="text-indigo-600 flex flex-col items-center gap-1">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Home</span>
            </button>
            <button class="text-slate-400 flex flex-col items-center gap-1" onclick="alert('Loading Tools...')">
                <i data-lucide="layers" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Tools</span>
            </button>
            <button class="text-slate-400 flex flex-col items-center gap-1" onclick="location.reload()">
                <i data-lucide="refresh-cw" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Reload</span>
            </button>
            <button class="text-slate-400 flex flex-col items-center gap-1" onclick="signOut()">
                <i data-lucide="log-out" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Exit</span>
            </button>
        </nav>
    </div>

    <script>
        lucide.createIcons();
        const SUPABASE_URL = 'https://puvdfqnjzliiuupchppj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('authBtn').innerText = isLogin ? 'Enter Workspace' : 'Create My Account';
            document.getElementById('authMsg').innerText = isLogin ? 'New here? Create Account' : 'Already a user? Log In';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('authBtn');
            btn.innerText = "Connecting...";

            const { data, error } = isLogin 
                ? await _supabase.auth.signInWithPassword({ email, password })
                : await _supabase.auth.signUp({ email, password });

            if (error) {
                alert(error.message);
                btn.innerText = isLogin ? 'Enter Workspace' : 'Create My Account';
            } else {
                checkUser();
            }
        }

        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                document.getElementById('authView').classList.add('hidden-view');
                
                // Check if profile exists
                const { data: profile } = await _supabase.from('profiles').select('*').single();
                
                if (!profile || !profile.company_name) {
                    document.getElementById('onboardingView').classList.remove('hidden-view');
                } else {
                    showDashboard(profile);
                }
            }
        }

        async function finishSetup() {
            const company = document.getElementById('setupCompanyName').value;
            if (!company) return alert("Please enter a name");
            
            const { data: { user } } = await _supabase.auth.getUser();
            
            // This manually updates the profile table you created earlier
            await _supabase.from('profiles').upsert({ id: user.id, company_name: company });
            
            document.getElementById('onboardingView').classList.add('hidden-view');
            checkUser();
        }

        function showDashboard(profile) {
            document.getElementById('mainView').classList.remove('hidden-view');
            document.getElementById('displayCompanyName').innerText = profile.company_name;
            
            // Get sub status
            _supabase.from('subscriptions').select('plan_tier').single().then(({data}) => {
                if (data) document.getElementById('planDisplay').innerText = data.plan_tier.split('_')[0];
            });
        }

        async function signOut() {
            await _supabase.auth.signOut();
            location.reload();
        }

        checkUser();
    </script>
</body>
</html>

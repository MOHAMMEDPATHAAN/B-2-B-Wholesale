<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Debug Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-6 flex flex-col items-center justify-center font-sans">

    <!-- CONNECTION TESTER (To find the error) -->
    <div id="debugPanel" class="bg-slate-800 p-4 rounded-xl border border-slate-700 w-full max-w-md mb-6">
        <h3 class="text-sm font-bold text-slate-400 uppercase mb-2">System Diagnostics</h3>
        <button onclick="testConnection()" class="bg-yellow-500 text-black px-4 py-2 rounded-lg font-bold text-sm w-full">
            🔍 TEST CONNECTION TO SUPABASE
        </button>
        <div id="debugLog" class="mt-2 text-xs font-mono text-slate-300 bg-black p-2 rounded max-h-32 overflow-y-auto">
            Ready to test...
        </div>
    </div>

    <!-- AUTH BOX -->
    <div id="authView" class="bg-slate-800 p-8 rounded-3xl border border-slate-700 w-full max-w-md shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center">Business Portal</h2>
        <input type="text" id="fullName" placeholder="Company Name" class="w-full bg-slate-700 border border-slate-600 p-3 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
        <input type="email" id="email" placeholder="Business Email" class="w-full bg-slate-700 border border-slate-600 p-3 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
        <input type="password" id="password" placeholder="Password" class="w-full bg-slate-700 border border-slate-600 p-3 rounded-xl mb-6 outline-none focus:ring-2 focus:ring-blue-500">
        
        <div class="flex gap-4">
            <button onclick="signUp()" class="flex-1 bg-slate-700 p-3 rounded-xl font-bold hover:bg-slate-600">Sign Up</button>
            <button onclick="logIn()" class="flex-1 bg-blue-600 p-3 rounded-xl font-bold hover:bg-blue-500">Log In</button>
        </div>
        <p id="authMessage" class="mt-4 text-center text-sm"></p>
    </div>

    <script>
        // --- 🛑 PASTE CAREFULLY HERE 🛑 ---
        const SUPABASE_URL = 'https://mcp.supabase.com/mcp?project_ref=puvdfqnjzliiuupchppj'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function log(msg) {
            const el = document.getElementById('debugLog');
            el.innerHTML += `> ${msg}<br>`;
            el.scrollTop = el.scrollHeight;
        }

        async function testConnection() {
            log("Starting connection test...");
            log(`URL: ${SUPABASE_URL.substring(0, 20)}...`);
            
            try {
                // Try to fetch the Supabase health check
                const res = await fetch(`${SUPABASE_URL}/rest/v1/`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY }
                });
                
                if (res.ok) {
                    log("<span class='text-green-400'>SUCCESS: Supabase responded!</span>");
                    alert("✅ CONNECTION SUCCESSFUL!\n\nYour URL and Key are working. If signup still fails, it's a Supabase Auth setting.");
                } else {
                    log(`<span class='text-red-400'>FAILED: Status ${res.status}</span>`);
                    alert(`❌ SERVER ERROR: ${res.status}\nCheck your Anon Key.`);
                }
            } catch (err) {
                log(`<span class='text-red-400'>CRITICAL ERROR: ${err.message}</span>`);
                alert("❌ FAILED TO FETCH\n\nThis usually means:\n1. Extra space in URL\n2. Ad-blocker active\n3. Wrong URL format (no https://)");
            }
        }

        async function signUp() {
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');

            msg.innerText = "Processing...";
            
            try {
                const { data, error } = await _supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { full_name: name } }
                });

                if (error) {
                    msg.innerText = error.message;
                    msg.style.color = "#f87171";
                } else {
                    msg.innerText = "Check your email for a verification link!";
                    msg.style.color = "#4ade80";
                }
            } catch (err) {
                msg.innerText = "Network Error: Failed to fetch";
                msg.style.color = "#f87171";
                console.error(err);
            }
        }

        async function logIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else alert("Logged In!");
        }
    </script>
</body>
</html>

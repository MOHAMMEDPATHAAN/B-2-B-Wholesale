<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add - Golden's</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { gold: { 400: '#FACC15', 500: '#EAB308', 600: '#CA8A04' }, premium: { 900: '#0a0a0a', 800: '#171717' } }
                }
            }
        }
    </script>
    <style>
        body { background: #f8fafc; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .dark body { background: #0f172a; }
        .theme-golden body { background: radial-gradient(circle at center, #241c00 0%, #0a0a0a 70%, #000000 100%); color: #fef08a; }
        
        .glass-btn {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark .glass-btn { background: rgba(30, 41, 59, 0.8); border-color: rgba(255,255,255,0.05); }
        .theme-golden .glass-btn { background: rgba(20, 15, 0, 0.8); border: 1px solid rgba(234, 179, 8, 0.3); box-shadow: 0 10px 40px rgba(234, 179, 8, 0.15); }
        .glass-btn:active { transform: scale(0.95); }

        /* Premium Intro Animation */
        .intro-container { animation: fadeOutUp 1s ease-in-out 2s forwards; position: absolute; z-index: 50; display: flex; flex-col; align-items: center; }
        .options-container { opacity: 0; transform: translateY(50px); animation: fadeInUp 0.8s ease-out 2.5s forwards; }
        
        @keyframes fadeOutUp { to { opacity: 0; transform: translateY(-50px); pointer-events: none; } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .text-gold-gradient { background: linear-gradient(to right, #FDE047, #CA8A04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .theme-golden .text-gold-gradient { text-shadow: 0 0 20px rgba(234,179,8,0.4); }

        /* Developer Logo Animation */
        .dev-logo { font-size: 24px; font-weight: 800; color: #EAB308; letter-spacing: 3px; display: flex; align-items: center; justify-content: center; }
        .text-tool { display: inline-block; overflow: hidden; animation: hideTool 2s ease-in-out forwards; white-space: nowrap; }
        .text-apos { display: inline-block; overflow: hidden; max-width: 0; opacity: 0; animation: showApos 2s ease-in-out forwards; }
        @keyframes hideTool { 0%, 20% { max-width: 80px; opacity: 1; padding-left: 6px; } 80%, 100% { max-width: 0px; opacity: 0; padding-left: 0px; } }
        @keyframes showApos { 0%, 20% { max-width: 0; opacity: 0; } 80%, 100% { max-width: 15px; opacity: 1; } }
    </style>
</head>
<body class="transition-colors duration-300">

    <!-- Golden toolS Animation -->
    <div class="intro-container flex flex-col items-center">
        <i data-lucide="sparkles" class="w-12 h-12 text-gold-500 mb-4 animate-pulse"></i>
        <div class="dev-logo">
            <span>GOLDEN</span><span class="text-apos">'</span><span class="text-tool"> tool</span><span>S</span>
        </div>
        <p class="text-xs text-slate-400 mt-2 tracking-widest uppercase font-bold">Upload Center</p>
    </div>

    <!-- The Choices -->
    <div class="options-container w-full max-w-sm px-6 flex flex-col gap-6">
        <h2 class="text-2xl font-extrabold text-center text-slate-800 dark:text-white theme-golden:text-gold-300 mb-2">What are we creating?</h2>
        
        <button onclick="routeTo('products.html')" class="glass-btn w-full p-8 rounded-3xl flex flex-col items-center justify-center gap-4 group hover:border-gold-500">
            <div class="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center group-hover:scale-110 transition-transform theme-golden:bg-premium-800 theme-golden:border theme-golden:border-gold-500/30">
                <i data-lucide="package-open" class="w-10 h-10 text-gold-500"></i>
            </div>
            <div class="text-center">
                <h3 class="text-lg font-bold text-slate-800 dark:text-white theme-golden:text-gold-100">B2B Product</h3>
                <p class="text-xs text-slate-500 mt-1 theme-golden:text-gold-200/50">Add inventory, wholesale prices & sizes</p>
            </div>
        </button>

        <button onclick="routeTo('reels.html')" class="glass-btn w-full p-8 rounded-3xl flex flex-col items-center justify-center gap-4 group hover:border-gold-500">
            <div class="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center group-hover:scale-110 transition-transform theme-golden:bg-premium-800 theme-golden:border theme-golden:border-gold-500/30">
                <i data-lucide="video" class="w-10 h-10 text-gold-500"></i>
            </div>
            <div class="text-center">
                <h3 class="text-lg font-bold text-slate-800 dark:text-white theme-golden:text-gold-100">Promotional Reel</h3>
                <p class="text-xs text-slate-500 mt-1 theme-golden:text-gold-200/50">Upload video & link to a product</p>
            </div>
        </button>
    </div>

    <script>
        lucide.createIcons();
        
        // Apply Global Theme
        const theme = localStorage.getItem('golden_theme') || 'system';
        const html = document.documentElement;
        if (theme === 'dark') html.classList.add('dark');
        else if (theme === 'golden') html.classList.add('dark', 'theme-golden');
        else if (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) html.classList.add('dark');

        function routeTo(module) {
            if(window.parent && typeof window.parent.loadModule === 'function') {
                window.parent.loadModule(module, null); // null doesn't change active nav icon, keeps "+" highlighted
            }
        }
    </script>
</body>
</html>w

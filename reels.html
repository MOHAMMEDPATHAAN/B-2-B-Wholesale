<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reels - Golden's</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gold: { 400: '#FACC15', 500: '#EAB308', 600: '#CA8A04' }, premium: { 900: '#0a0a0a', 800: '#171717' } } } } }
    </script>
    <style>
        body { background: #f8fafc; padding-bottom: 100px; }
        .dark body { background: #0f172a; }
        .theme-golden body { background: #0a0a0a; color: #fef08a; }
        .hidden-view { display: none !important; }
        
        .header-glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 40; }
        .dark .header-glass { background: rgba(15,23,42,0.9); border-color: rgba(255,255,255,0.05); }
        .theme-golden .header-glass { background: rgba(10,10,10,0.9); border-color: rgba(234,179,8,0.2); }

        .btn-plus { background: #22c55e; color: white; box-shadow: 0 4px 15px rgba(34,197,94,0.3); }
        .theme-golden .btn-plus { background: linear-gradient(135deg, #FDE047, #EAB308); color: #000; box-shadow: 0 4px 15px rgba(234,179,8,0.3); }

        .form-input { width: 100%; padding: 14px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; outline: none; font-size: 14px; font-weight: 600; }
        .dark .form-input { background: #1e293b; border-color: #334155; color: white; }
        .theme-golden .form-input { background: rgba(20,15,0,0.5); border-color: rgba(234,179,8,0.3); color: #fef08a; }
        
        .reel-card { border-radius: 16px; overflow: hidden; position: relative; aspect-ratio: 9/16; background: #000; cursor: pointer; transition: transform 0.2s; }
        .reel-card:active { transform: scale(0.98); }
        .theme-golden .reel-card { border: 1px solid rgba(234,179,8,0.2); box-shadow: 0 4px 20px rgba(234,179,8,0.1); }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; overflow-y: auto; backdrop-filter: blur(5px); }
        .modal-content { background: white; min-height: 100vh; padding: 20px; padding-bottom: 100px; animation: slideUp 0.3s ease-out; }
        .dark .modal-content { background: #0f172a; }
        .theme-golden .modal-content { background: #0a0a0a; border-top: 1px solid rgba(234,179,8,0.3); }
        
        .instant-view-content { background: black; width: 100%; height: 100vh; position: relative; display: flex; flex-col; justify-content: center; }
        
        /* Multiple Product Checkbox List */
        .product-checkbox-list { max-height: 140px; overflow-y: auto; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; padding: 8px; }
        .dark .product-checkbox-list { background: #1e293b; border-color: #334155; }
        .theme-golden .product-checkbox-list { background: rgba(20,15,0,0.5); border-color: rgba(234,179,8,0.3); }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="transition-colors duration-300">

    <div class="sticky top-0 z-40 header-glass px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-extrabold uppercase tracking-wide text-slate-800 dark:text-white theme-golden:text-gold-400">Promotions</h1>
        <button onclick="openUploadModal()" class="btn-plus p-2 rounded-xl flex items-center justify-center transition-transform hover:scale-105">
            <i data-lucide="video" class="w-6 h-6"></i>
        </button>
    </div>

    <div id="reelsGrid" class="p-4 grid grid-cols-2 gap-4"></div>

    <div id="uploadModal" class="modal-overlay hidden-view">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6 sticky top-0 bg-white dark:bg-slate-900 theme-golden:bg-premium-900 py-2 z-10">
                <h2 id="modalTitle" class="text-xl font-extrabold text-slate-800 dark:text-white theme-golden:text-gold-400">Create Reel</h2>
                <button onclick="closeUploadModal()" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <div class="space-y-5 max-w-lg mx-auto">
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-6 border-2 border-dashed border-slate-300 dark:border-slate-700 theme-golden:border-gold-500/50 rounded-2xl text-center bg-slate-50 dark:bg-slate-800 theme-golden:bg-premium-800">
                        <i data-lucide="video" class="w-8 h-8 mx-auto text-slate-400 theme-golden:text-gold-500 mb-2"></i>
                        <label class="block text-xs font-bold text-slate-800 dark:text-white theme-golden:text-gold-100 cursor-pointer">
                            Video (Max 1 Min)
                            <input type="file" id="reelMedia" accept="video/mp4,video/x-m4v,video/*" class="hidden" onchange="previewVideo(event)">
                        </label>
                    </div>
                </div>
                
                <video id="videoPreview" class="w-full mt-4 rounded-xl hidden-view" controls></video>
                <input type="text" id="reelTitle" placeholder="Catchy Hook / Title *" class="form-input">
                <textarea id="reelDesc" placeholder="Caption / Description..." rows="3" class="form-input"></textarea>

                <!-- MULTI PRODUCT SELECTOR -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 theme-golden:text-gold-500">Connect Products (Select Multiple)</label>
                    <div id="linkedProductsContainer" class="product-checkbox-list space-y-2">
                        <!-- Checkboxes injected here -->
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="reelStatus" class="form-input">
                        <option value="published">🟢 Public</option>
                        <option value="draft">🟡 Private Draft</option>
                    </select>
                    <select id="reelCta" class="form-input">
                        <option value="Buy Now">Buy Now</option>
                        <option value="Contact Sales">Contact Sales</option>
                        <option value="Learn More">Learn More</option>
                    </select>
                </div>

                <button onclick="saveReel()" id="saveBtn" class="w-full mt-4 bg-gradient-to-r from-green-500 to-emerald-600 theme-golden:from-gold-500 theme-golden:to-gold-600 text-white theme-golden:text-black font-bold py-4 rounded-xl shadow-lg uppercase tracking-wider text-sm transition-transform hover:scale-[1.02]">
                    Publish Reel
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const SUPABASE_URL = 'https://puvdfqnjzliiuupchppj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dmRmcW5qemxpaXV1cGNocHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTExOTgsImV4cCI6MjA5MjU4NzE5OH0.hDK6fjZ2SesJ7qkeWVXxOoxW2Xmr7MDlKO-BFtJtDu0,';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let allReels = [];

        function applySettings() {
            const theme = localStorage.getItem('golden_theme') || 'system';
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else if (theme === 'golden') document.documentElement.classList.add('dark', 'theme-golden');
        }

        async function init() {
            applySettings();
            const { data: { user } } = await _supabase.auth.getUser();
            if(user) currentUser = user;
            fetchReels();
            fetchUserProducts();
        }

        async function fetchUserProducts() {
            if(!currentUser) return;
            const { data } = await _supabase.from('products').select('id, title').eq('user_id', currentUser.id);
            if(data) {
                const list = document.getElementById('linkedProductsContainer');
                list.innerHTML = '';
                if(data.length === 0) list.innerHTML = '<p class="text-xs text-slate-400 p-2">No products created yet.</p>';
                data.forEach(p => {
                    list.innerHTML += `
                        <label class="flex items-center gap-3 p-1 cursor-pointer">
                            <input type="checkbox" name="linked_products" value="${p.id}" class="w-4 h-4 rounded text-gold-500 border-slate-300 dark:border-slate-600 focus:ring-gold-500"> 
                            <span class="text-sm font-bold text-slate-700 dark:text-slate-200 theme-golden:text-gold-200">${p.title}</span>
                        </label>
                    `;
                });
            }
        }

        async function fetchReels() {
            if(!currentUser) return;
            const { data } = await _supabase.from('reels').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            if(data) {
                allReels = data;
                renderReels();
            }
        }

        function renderReels() {
            const grid = document.getElementById('reelsGrid');
            grid.innerHTML = '';
            allReels.forEach(r => {
                const vidUrl = _supabase.storage.from('reels_media').getPublicUrl(r.video_url).data.publicUrl;
                // UI shows multiple badge if array > 1
                const linkedCount = (r.linked_product_ids || []).length;
                const linkBadge = linkedCount > 0 ? `<div class="absolute top-2 right-2 bg-gold-500/90 backdrop-blur text-[10px] font-bold text-black px-2 py-1 rounded-md z-10 shadow-lg"><i data-lucide="link" class="w-3 h-3 inline"></i> ${linkedCount} Products</div>` : '';
                
                grid.innerHTML += `
                    <div class="reel-card">
                        ${linkBadge}
                        <video src="${vidUrl}" class="w-full h-full object-cover" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
                        <div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/90 via-black/50 to-transparent z-20">
                            <h3 class="font-bold text-sm text-white truncate">${r.title}</h3>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function previewVideo(event) {
            const file = event.target.files[0];
            if(file) {
                const vid = document.getElementById('videoPreview');
                vid.src = URL.createObjectURL(file);
                vid.classList.remove('hidden-view');
            }
        }

        function openUploadModal() { 
            document.getElementById('uploadModal').classList.remove('hidden-view'); 
            // Reset checkboxes
            document.querySelectorAll('input[name="linked_products"]').forEach(cb => cb.checked = false);
        }
        function closeUploadModal() { document.getElementById('uploadModal').classList.add('hidden-view'); }

        async function saveReel() {
            const btn = document.getElementById('saveBtn');
            const file = document.getElementById('reelMedia').files[0];
            const title = document.getElementById('reelTitle').value;

            if(!file || !title) return alert("Video and Title are required.");

            // Extract all checked products
            const selectedProductIds = Array.from(document.querySelectorAll('input[name="linked_products"]:checked')).map(cb => cb.value);

            btn.innerText = "Processing... (Do not close)";
            btn.disabled = true;

            const videoPath = `${currentUser.id}/reel_${Date.now()}.${file.name.split('.').pop()}`;
            await _supabase.storage.from('reels_media').upload(videoPath, file);
            
            const reelData = {
                user_id: currentUser.id, title: title, description: document.getElementById('reelDesc').value,
                video_url: videoPath, status: document.getElementById('reelStatus').value,
                cta_type: document.getElementById('reelCta').value,
                linked_product_ids: selectedProductIds // Save array of UUIDs
            };

            await _supabase.from('reels').insert([reelData]);
            closeUploadModal(); fetchReels();
            btn.innerText = "Publish Reel"; btn.disabled = false;
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

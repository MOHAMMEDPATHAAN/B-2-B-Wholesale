<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: transparent; }
        .sub-view { position: fixed; inset: 0; background: #f8fafc; z-index: 100; left: 100%; transition: left 0.4s ease; overflow-y: auto; }
        .dark .sub-view { background: #0f172a; }
        .sub-view.active { left: 0; }
        .edit-input { background: transparent; border-bottom: 2px solid #e2e8f0; font-weight: 700; }
        .dark .edit-input { border-color: #334155; color: white; }
    </style>
</head>
<body class="p-5 text-slate-800 dark:text-slate-100 pb-32">

    <header class="flex justify-between items-center mb-10">
        <h1 data-tr="profile_title" class="text-3xl font-black uppercase">Identity</h1>
        <div class="flex gap-3">
            <i data-lucide="bell" class="w-6 h-6 text-slate-400"></i>
            <i data-lucide="shield-check" class="w-6 h-6 text-green-500"></i>
        </div>
    </header>

    <!-- CEO Info Card -->
    <div onclick="openView('editView')" class="bg-gradient-to-br from-slate-900 to-slate-800 p-6 rounded-[2.5rem] shadow-2xl flex items-center gap-5 cursor-pointer relative overflow-hidden border border-slate-700">
        <div class="relative">
            <img id="ceoPic" src="https://ui-avatars.com/api/?name=CEO&background=EAB308&color=000" class="w-16 h-16 rounded-2xl object-cover border-2 border-gold-500">
            <input type="file" id="ceoPicInp" class="hidden" onchange="uploadCeoPic(event)">
        </div>
        <div>
            <h2 id="ceoName" class="text-xl font-bold text-white">CEO Name</h2>
            <p id="compName" class="text-sm text-gold-500 font-bold uppercase tracking-widest">Company Name</p>
        </div>
        <i data-lucide="chevron-right" class="ml-auto text-slate-500"></i>
    </div>

    <!-- Menu List -->
    <div class="mt-10 space-y-3">
        <div onclick="openView('settingsView')" class="flex items-center justify-between p-5 bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-4"><i data-lucide="settings" class="text-gold-500"></i><span data-tr="settings" class="font-bold">Settings</span></div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
        </div>
        <div onclick="openView('doc2View')" class="flex items-center justify-between p-5 bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-4"><i data-lucide="file-plus" class="text-blue-500"></i><span data-tr="doc2" class="font-bold">Add Supplemental Document</span></div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
        </div>
    </div>

    <!-- Settings Sub-View -->
    <div id="settingsView" class="sub-view p-6">
        <button onclick="closeView('settingsView')" class="p-3 bg-white dark:bg-slate-800 rounded-full mb-8"><i data-lucide="arrow-left"></i></button>
        <h2 class="text-2xl font-black mb-8">Workspace Settings</h2>
        
        <div class="space-y-6">
            <div class="p-5 bg-white dark:bg-slate-900 rounded-3xl">
                <label class="text-[10px] font-black text-slate-400 uppercase">App Theme</label>
                <select onchange="changeTheme(this.value)" id="themeSel" class="w-full mt-2 bg-transparent font-bold text-gold-500 outline-none">
                    <option value="dark">Dark Mode (Default)</option>
                    <option value="light">Light Mode</option>
                </select>
            </div>
            <div class="p-5 bg-white dark:bg-slate-900 rounded-3xl">
                <label class="text-[10px] font-black text-slate-400 uppercase">System Language</label>
                <select onchange="changeLang(this.value)" id="langSel" class="w-full mt-2 bg-transparent font-bold text-gold-500 outline-none">
                    <option value="en">English (Global)</option>
                    <option value="hi">हिन्दी (Hindi)</option>
                    <option value="ur">اردو (Urdu)</option>
                    <option value="ar">العربية (Arabic)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Document 2 Sub-View -->
    <div id="doc2View" class="sub-view p-6">
        <button onclick="closeView('doc2View')" class="p-3 bg-white dark:bg-slate-800 rounded-full mb-8"><i data-lucide="arrow-left"></i></button>
        <h2 class="text-2xl font-black mb-4">Verification Layer 2</h2>
        <p class="text-sm text-slate-500 mb-8">If your primary document was rejected or incomplete, upload your Secondary Trade License here. This is only allowed ONCE.</p>
        
        <div id="doc2UploadArea" class="border-2 border-dashed border-slate-300 dark:border-slate-700 p-10 rounded-[2.5rem] text-center">
            <i data-lucide="upload-cloud" class="w-12 h-12 mx-auto mb-4 text-slate-400"></i>
            <input type="file" id="doc2File" class="hidden" onchange="handleDoc2(this)">
            <button onclick="document.getElementById('doc2File').click()" class="bg-gold-500 text-slate-950 px-6 py-3 rounded-2xl font-black">Choose Document 2</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const _supabase = window.parent._supabase;
        let currentUser = null;

        const TRANSLATIONS = {
            en: { profile_title: "Identity", settings: "Settings", doc2: "Supplemental Document" },
            hi: { profile_title: "पहचान", settings: "सेटिंग्स", doc2: "पूरक दस्तावेज़" },
            ur: { profile_title: "شناخت", settings: "ترجیحات", doc2: "اضافی دستاویز" }
        };

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            currentUser = user;
            const { data } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            if(data) {
                document.getElementById('ceoName').innerText = data.ceo_name;
                document.getElementById('compName').innerText = data.company_name;
                if(data.language) changeLang(data.language);
                if(data.doc_2_url) document.getElementById('doc2UploadArea').innerHTML = "<p class='text-green-500 font-bold'>✓ Supplemental Document Submitted</p>";
            }
        }

        function openView(id) { document.getElementById(id).classList.add('active'); }
        function closeView(id) { document.getElementById(id).classList.remove('active'); }

        async function changeTheme(mode) {
            window.parent.syncTheme(mode);
            await _supabase.from('profiles').update({ theme: mode }).eq('id', currentUser.id);
        }

        async function changeLang(lang) {
            document.querySelectorAll('[data-tr]').forEach(el => {
                const key = el.getAttribute('data-tr');
                if(TRANSLATIONS[lang][key]) el.innerText = TRANSLATIONS[lang][key];
            });
            window.parent.syncLanguage(lang);
            await _supabase.from('profiles').update({ language: lang }).eq('id', currentUser.id);
        }

        async function handleDoc2(input) {
            const file = input.files[0];
            if(!file) return;
            const path = `${currentUser.id}/doc2_${Date.now()}`;
            await _supabase.storage.from('verification_docs').upload(path, file);
            await _supabase.from('profiles').update({ doc_2_url: path }).eq('id', currentUser.id);
            alert("Document 2 successfully saved to vault.");
            init();
        }

        init();
    </script>
</body>
</html>
